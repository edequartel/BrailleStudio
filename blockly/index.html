<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Braille Activity Builder + WS</title>

<script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
<script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
<script src="https://unpkg.com/blockly/msg/en.js"></script>

<style>
body { margin:0; font-family:Arial; }
#header { padding:10px; border-bottom:1px solid #ccc; display:flex; gap:8px; flex-wrap:wrap;}
#blocklyDiv { height:70vh; width:100%; }
#log { width:100%; height:150px; font-family:monospace; }
button { padding:6px 10px; }
</style>
</head>

<body>

<div id="header">
  <button id="connectBtn">🔌 Connect</button>
  <button id="runBtn">🚩 Start</button>
  <button id="stopBtn">⛔ Stop</button>
  <button id="saveBtn">💾 Save</button>
  <button id="loadBtn">📂 Load</button>
  <button id="newBtn">🆕 New</button>
  <input id="fileInput" type="file" style="display:none">
</div>

<div id="blocklyDiv"></div>

<textarea id="log" readonly></textarea>

<xml id="toolbox" style="display:none">
  <category name="Events" colour="#FFBF00">
    <block type="event_when_started"></block>
    <block type="event_when_thumb"></block>
    <block type="event_when_cursor"></block>
  </category>

  <category name="Braille" colour="#4C97FF">
    <block type="bb_set_text"></block>
    <block type="bb_move_caret"></block>
    <block type="bb_get_line"></block>
  </category>

  <category name="Logic" colour="#59C059">
    <block type="controls_if"></block>
    <block type="logic_compare"></block>
  </category>

  <category name="Math" colour="#9966FF">
    <block type="math_number"></block>
  </category>

  <category name="Text" colour="#5CB1D6">
    <block type="text"></block>
  </category>
</xml>

<script>
/* ---------------- LOG ---------------- */
function log(m){
  document.getElementById("log").value += m + "\n";
}

/* ---------------- WS ---------------- */
let ws=null;

function connect(){
  ws = new WebSocket("ws://localhost:5000/ws");

  ws.onopen = ()=> log("WS connected");

  ws.onmessage = async (e)=>{
    const msg = JSON.parse(e.data);
    const type = msg.Type ?? msg.type;

    log("WS OUT " + JSON.stringify(msg));

    if(type==="brailleLine"){
      runtime.text = msg.sourceText;
      runtime.caret = msg.meta?.caretTextPosition ?? msg.caret?.textIndex;
    }

    if(type==="thumbKey"){
      await dispatch({type:"thumb", key:msg.Payload.Name});
    }

    if(type==="cursor"){
      await dispatch({type:"cursor", cell:msg.Cursor.CellIndex});
    }

    if(type==="editorKey"){
      await dispatch({type:"editor", key:msg.Payload.Key});
    }
  };
}

function send(obj){
  if(ws && ws.readyState===1){
    ws.send(JSON.stringify(obj));
    log("WS IN " + JSON.stringify(obj));
  }
}

/* ---------------- STATE ---------------- */
const runtime = {
  stopped:false,
  text:"",
  caret:0
};

/* ---------------- BLOCKLY ---------------- */
Blockly.Blocks['event_when_started'] = {
  init() {
    this.appendDummyInput().appendField("when started");
    this.appendStatementInput("DO").appendField("do");
    this.setColour("#FFBF00");
  }
};

Blockly.Blocks['event_when_thumb'] = {
  init() {
    this.appendDummyInput().appendField("when thumb");
    this.appendStatementInput("DO").appendField("do");
    this.setColour("#FFBF00");
  }
};

Blockly.Blocks['event_when_cursor'] = {
  init() {
    this.appendDummyInput().appendField("when cursor");
    this.appendStatementInput("DO").appendField("do");
    this.setColour("#FFBF00");
  }
};

Blockly.Blocks['bb_set_text'] = {
  init() {
    this.appendValueInput("TEXT").appendField("set text");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['bb_move_caret'] = {
  init() {
    this.appendValueInput("DELTA").appendField("move caret");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

Blockly.Blocks['bb_get_line'] = {
  init() {
    this.appendDummyInput().appendField("get braille line");
    this.setPreviousStatement(true);
    this.setNextStatement(true);
    this.setColour("#4C97FF");
  }
};

const workspace = Blockly.inject("blocklyDiv", {
  toolbox: document.getElementById("toolbox")
});

/* ---------------- EXECUTION ---------------- */
async function exec(block){
  while(block && !runtime.stopped){

    switch(block.type){

      case "bb_set_text":{
        const txt = block.getInputTargetBlock("TEXT")?.getFieldValue("TEXT") || "";
        send({
          type:"command",
          command:"editorInput",
          input:{kind:"text",text:txt,replace:true}
        });
        break;
      }

      case "bb_move_caret":{
        const val = Number(block.getInputTargetBlock("DELTA")?.getFieldValue("NUM")||0);
        send({type:"moveCaret",by:val,unit:"character"});
        break;
      }

      case "bb_get_line":{
        send({type:"getBrailleLine"});
        break;
      }

      case "controls_if":{
        const cond = true;
        if(cond){
          await exec(block.getInputTargetBlock("DO0"));
        }
        break;
      }
    }

    block = block.getNextBlock();
  }
}

async function dispatch(event){
  const blocks = workspace.getTopBlocks(true);

  for(const b of blocks){

    if(b.type==="event_when_started" && event.type==="started"){
      await exec(b.getInputTargetBlock("DO"));
    }

    if(b.type==="event_when_thumb" && event.type==="thumb"){
      await exec(b.getInputTargetBlock("DO"));
    }

    if(b.type==="event_when_cursor" && event.type==="cursor"){
      await exec(b.getInputTargetBlock("DO"));
    }
  }
}

/* ---------------- UI ---------------- */
document.getElementById("connectBtn").onclick = connect;

document.getElementById("runBtn").onclick = async ()=>{
  runtime.stopped=false;
  await dispatch({type:"started"});
  send({type:"getBrailleLine"});
};

document.getElementById("stopBtn").onclick = ()=>{
  runtime.stopped=true;
};

document.getElementById("saveBtn").onclick = ()=>{
  const xml = Blockly.Xml.domToPrettyText(
    Blockly.Xml.workspaceToDom(workspace)
  );
  const blob = new Blob([xml]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="blocks.xml";
  a.click();
};

document.getElementById("loadBtn").onclick = ()=>{
  document.getElementById("fileInput").click();
};

document.getElementById("fileInput").onchange = e=>{
  const reader=new FileReader();
  reader.onload = ()=>{
    workspace.clear();
    Blockly.Xml.domToWorkspace(
      Blockly.utils.xml.textToDom(reader.result),
      workspace
    );
  };
  reader.readAsText(e.target.files[0]);
};

document.getElementById("newBtn").onclick = ()=>{
  workspace.clear();
};

</script>
</body>
</html>
