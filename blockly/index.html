<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Braille Activity Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
  <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
  <script src="https://unpkg.com/blockly/msg/en.js"></script>

  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --panel-soft: #f8faff;
      --border: #d9e0ea;
      --text: #1f2937;
      --muted: #6b7280;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #2563eb;
      --amber: #f59e0b;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
    }

    #topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    #title {
      font-size: 22px;
      font-weight: bold;
      margin-right: 10px;
    }

    .spacer {
      flex: 1 1 auto;
    }

    .btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(0.98);
    }

    .btn-green {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .btn-red {
      background: var(--red);
      color: white;
      border-color: var(--red);
    }

    .btn-blue {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    .btn-soft {
      background: #eef4ff;
      color: #1d4ed8;
      border-color: #c7d7ff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #fee2e2;
      color: #991b1b;
    }

    .badge.connected {
      background: #dcfce7;
      color: #166534;
    }

    #main {
      display: grid;
      grid-template-columns: 1fr 390px;
      min-height: 0;
    }

    #workspaceWrap {
      min-width: 0;
      min-height: 0;
      padding: 10px;
    }

    #blocklyDiv {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: white;
    }

    #sidebar {
      border-left: 1px solid var(--border);
      background: var(--panel);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto;
    }

    .card {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .card h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
    }

    .mono {
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      min-height: 110px;
    }

    textarea.mono {
      width: 100%;
      resize: vertical;
      min-height: 170px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="title">Braille Activity Builder</div>

    <button id="connectBtn" class="btn btn-blue">Connect WS</button>
    <button id="disconnectBtn" class="btn">Disconnect WS</button>
    <div id="wsBadge" class="badge">Disconnected</div>

    <button id="runBtn" class="btn btn-green">Start</button>
    <button id="stopBtn" class="btn btn-red">Stop</button>

    <button id="saveBtn" class="btn">Save</button>
    <button id="saveAsBtn" class="btn">Save As</button>
    <button id="loadBtn" class="btn">Load</button>
    <input id="fileNameInput" class="btn" type="text" value="braille-activity.xml" style="min-width:200px; cursor:text;">
    <button id="newBtn" class="btn">New</button>
    <input id="fileInput" type="file" accept=".xml,.blockly,text/xml,application/xml">

    <div class="spacer"></div>

    <button id="simThumbLeftBtn" class="btn btn-soft">Thumb Left</button>
    <button id="simThumbRightBtn" class="btn btn-soft">Thumb Right</button>
    <button id="simCursor5Btn" class="btn btn-soft">Cursor 5</button>
    <button id="simChord1Btn" class="btn btn-soft">Chord 1</button>
  </div>

  <div id="main">
    <div id="workspaceWrap">
      <div id="blocklyDiv"></div>
    </div>

    <div id="sidebar">
      <div class="card">
        <h3>Status</h3>
        <div id="statusBox" class="mono"></div>
      </div>

      <div class="card">
        <h3>Last brailleLine</h3>
        <div id="brailleLineBox" class="mono"></div>
      </div>

      <div class="card">
        <h3>Log</h3>
        <textarea id="logBox" class="mono" readonly></textarea>
      </div>

      <div class="card">
        <h3>Tips</h3>
        <div class="small">
          Use <strong>Variables</strong> for score, tries, level.<br>
          Use <strong>State values</strong> to react to cursor position and thumb keys.<br>
          <strong>Start</strong> only runs stacks under <strong>when started</strong>.
        </div>
      </div>

      <div class="card">
        <h3>Sounds</h3>
        <div class="small">Base URL:</div>
        <div id="soundBaseUrlBox" class="mono"></div>
        <div class="row">
          <input id="soundFileInput" type="text" value="voorbeeld.mp3" style="flex:1; min-width:180px; padding:6px 8px;">
          <button id="playSoundBtn" class="btn">Play file</button>
          <button id="stopSoundBtn" class="btn">Stop sound</button>
        </div>
      </div>
    </div>
  </div>
</div>

<xml id="toolbox" style="display:none">
  <category name="Events" colour="#F59E0B">
    <block type="event_when_started"></block>
    <block type="event_when_timer"></block>
    <block type="event_when_thumb_key"></block>
    <block type="event_when_any_thumb_key"></block>
    <block type="event_when_cursor_routing"></block>
    <block type="event_when_cursor_position_changed"></block>
    <block type="event_when_chord"></block>
    <block type="event_when_editor_key"></block>
  </category>

  <category name="BrailleBridge" colour="#2563EB">
    <block type="bb_set_text"></block>
    <block type="bb_append_text"></block>
    <block type="bb_send_key"></block>
    <block type="bb_move_caret"></block>
    <block type="bb_set_caret"></block>
    <block type="bb_set_caret_from_cell"></block>
    <block type="bb_cursor_routing"></block>
    <block type="bb_set_editor_mode"></block>
    <block type="bb_set_insert_mode"></block>
    <block type="bb_set_caret_visibility"></block>
    <block type="bb_get_braille_line"></block>
    <block type="bb_set_caret_to_begin"></block>
    <block type="bb_set_caret_to_end"></block>
    <block type="bb_wait"></block>
    <block type="bb_wait_ms">
      <value name="MILLISECONDS">
        <shadow type="math_number">
          <field name="NUM">250</field>
        </shadow>
      </value>
    </block>
  </category>

  <category name="Timers" colour="#0EA5E9">
    <block type="timer_start">
      <value name="SECONDS">
        <shadow type="math_number">
          <field name="NUM">1</field>
        </shadow>
      </value>
    </block>
    <block type="timer_stop"></block>
    <block type="timer_stop_all"></block>
    <block type="state_last_timer_name"></block>
    <block type="state_last_timer_tick"></block>
  </category>

  <category name="Sounds" colour="#10B981">
    <block type="sound_play_file"></block>
    <block type="sound_play_url"></block>
    <block type="sound_stop"></block>
    <block type="sound_set_volume">
      <value name="VOLUME">
        <shadow type="math_number">
          <field name="NUM">100</field>
        </shadow>
      </value>
    </block>
    <block type="state_last_sound"></block>
  </category>

  <category name="Logic" colour="#16A34A">
    <block type="controls_if"></block>
    <block type="logic_compare"></block>
    <block type="logic_operation"></block>
    <block type="logic_negate"></block>
    <block type="logic_boolean"></block>
  </category>

  <category name="Loops" colour="#D97706">
    <block type="controls_repeat_ext">
      <value name="TIMES">
        <shadow type="math_number">
          <field name="NUM">3</field>
        </shadow>
      </value>
    </block>
  </category>

  <category name="Variables" custom="VARIABLE" colour="#EA580C"></category>

  <category name="State values" colour="#7C3AED">
    <block type="state_text_caret"></block>
    <block type="state_cell_caret"></block>
    <block type="state_last_thumb_key"></block>
    <block type="state_last_cursor_cell"></block>
    <block type="state_last_chord"></block>
    <block type="state_last_editor_key"></block>
    <block type="state_editor_mode"></block>
    <block type="state_insert_mode"></block>
  </category>

  <category name="Math" colour="#7C3AED">
    <block type="math_number"></block>
    <block type="math_arithmetic"></block>
  </category>

  <category name="Text" colour="#0891B2">
    <block type="text"></block>
    <block type="text_join"></block>
  </category>
</xml>

<script>
/* ---------------- UI helpers ---------------- */
function log(message) {
  const box = document.getElementById('logBox');
  const now = new Date().toLocaleTimeString();
  box.value += `[${now}] ${message}\n`;
  box.scrollTop = box.scrollHeight;
}

function setWsBadge(connected) {
  const el = document.getElementById('wsBadge');
  el.textContent = connected ? 'Connected' : 'Disconnected';
  el.className = 'badge' + (connected ? ' connected' : '');
}

function renderBrailleLine(msg) {
  document.getElementById('brailleLineBox').textContent = msg
    ? JSON.stringify(msg, null, 2)
    : '';
}

/* ---------------- Runtime state ---------------- */
const runtime = {
  stopped: false,
  text: '',
  brailleUnicode: '',
  textCaret: 0,
  cellCaret: 0,
  editorMode: 'off',
  insertMode: 'off',
  caretVisible: true,
  lastThumbKey: '',
  lastCursorCell: -1,
  lastChord: '',
  lastEditorKey: '',
  lastSound: '',
  lastTimerName: '',
  lastTimerTick: 0,
  activeTable: '',
  lineId: 0
};

const variableValues = {};
const timerHandles = new Map();
let soundVolume = 1;
let activeAudio = null;
const SOUND_BASE_URL = 'https://www.tastenbraille.com/braillestudio/sounds/nl/speech/';
const BLOCKLY_FILE_NAME_KEY = 'blockly_file_name';
let currentFileHandle = null;
let ws = null;
let wsConnected = false;
let reconnectTimer = null;
let autoConnectEnabled = true;
let pendingStart = false;
let pendingStartGeneration = 0;
let runGeneration = 0;
let workspace = null;
const WS_URL = 'ws://localhost:5000/ws';
const AUTO_RECONNECT_MS = 2000;

function renderStatus() {
  const varLines = workspace
    ? workspace.getAllVariables().map(v => `${v.name} = ${variableValues[v.getId()] ?? 0}`)
    : [];

  document.getElementById('statusBox').textContent =
`ws connected     : ${wsConnected}
text             : ${runtime.text}
braille unicode  : ${runtime.brailleUnicode}
text caret       : ${runtime.textCaret}
cell caret       : ${runtime.cellCaret}
editor mode      : ${runtime.editorMode}
insert mode      : ${runtime.insertMode}
caret visible    : ${runtime.caretVisible}
last thumb key   : ${runtime.lastThumbKey}
last cursor cell : ${runtime.lastCursorCell}
last chord       : ${runtime.lastChord}
last editor key  : ${runtime.lastEditorKey}
last sound       : ${runtime.lastSound}
last timer name  : ${runtime.lastTimerName}
last timer tick  : ${runtime.lastTimerTick}
active table     : ${runtime.activeTable}
line id          : ${runtime.lineId}
stopped          : ${runtime.stopped}

variables:
${varLines.length ? varLines.join('\n') : '(none)'}`;
}

/* ---------------- WebSocket ---------------- */
function wsEventType(msg) {
  return msg?.Type ?? msg?.type ?? '';
}

function wsField(obj, upperName, lowerName) {
  if (!obj || typeof obj !== 'object') return null;
  if (obj[upperName] != null) return obj[upperName];
  if (obj[lowerName] != null) return obj[lowerName];
  return null;
}

function wsPayload(msg) {
  return wsField(msg, 'Payload', 'payload') || {};
}

function wsCursor(msg) {
  return wsField(msg, 'Cursor', 'cursor') || {};
}

function stopTimerByName(name) {
  const key = String(name || '').trim();
  if (!key) return;
  const handle = timerHandles.get(key);
  if (!handle) return;
  clearInterval(handle.id);
  timerHandles.delete(key);
  log('Timer stopped: ' + key);
}

function stopAllTimers() {
  for (const [, handle] of timerHandles) {
    clearInterval(handle.id);
  }
  if (timerHandles.size > 0) {
    log('All timers stopped (' + timerHandles.size + ')');
  }
  timerHandles.clear();
}

function startTimer(name, seconds, generation) {
  const key = String(name || '').trim();
  if (!key) {
    log('Timer start skipped: empty name');
    return;
  }
  const periodMs = Math.max(50, Math.floor(toNumber(seconds) * 1000));
  stopTimerByName(key);
  const state = { id: 0, tick: 0, generation };
  state.id = setInterval(() => {
    if (state.generation !== runGeneration || runtime.stopped) return;
    state.tick += 1;
    runtime.lastTimerName = key;
    runtime.lastTimerTick = state.tick;
    renderStatus();
    dispatchEvent({ type: 'timer', name: key, tick: state.tick }, state.generation)
      .catch(err => log('Timer dispatch failed (' + key + '): ' + err.message));
  }, periodMs);
  timerHandles.set(key, state);
  log('Timer started: ' + key + ' every ' + (periodMs / 1000) + 's');
}

function resolveSoundUrl(input) {
  const raw = String(input ?? '').trim();
  if (!raw) return '';
  if (/^https?:\/\//i.test(raw)) return raw;
  const filename = raw.toLowerCase().endsWith('.mp3') ? raw : (raw + '.mp3');
  return SOUND_BASE_URL + encodeURIComponent(filename);
}

function stopSound() {
  if (!activeAudio) return;
  try {
    activeAudio.pause();
    activeAudio.currentTime = 0;
  } catch {
    // ignore pause/currentTime errors
  }
  activeAudio = null;
}

async function playSound(input) {
  const url = resolveSoundUrl(input);
  if (!url) {
    log('Sound skipped: empty filename/url');
    return;
  }
  stopSound();
  const audio = new Audio(url);
  audio.volume = soundVolume;
  activeAudio = audio;
  runtime.lastSound = url;
  renderStatus();
  try {
    await audio.play();
    log('Sound play: ' + url);
  } catch (err) {
    log('Sound failed: ' + err.message);
  }
}

function isWsOpen() {
  return !!ws && ws.readyState === WebSocket.OPEN;
}

function clearReconnectTimer() {
  if (!reconnectTimer) return;
  clearTimeout(reconnectTimer);
  reconnectTimer = null;
}

function scheduleReconnect() {
  if (!autoConnectEnabled || reconnectTimer || isWsOpen()) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    if (!autoConnectEnabled || isWsOpen()) return;
    connectWs('auto-reconnect');
  }, AUTO_RECONNECT_MS);
}

function disconnectWs() {
  autoConnectEnabled = false;
  clearReconnectTimer();
  pendingStart = false;
  stopAllTimers();
  stopSound();
  if (ws) {
    try {
      ws.close(1000, 'client close');
    } catch (err) {
      log('WS close failed: ' + err.message);
    }
  }
  ws = null;
  wsConnected = false;
  setWsBadge(false);
  renderStatus();
  log('WS disconnected (manual)');
}

function connectWs(reason = 'manual') {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
    log('WS already connected/connecting');
    return;
  }

  if (reason !== 'auto-reconnect') {
    autoConnectEnabled = true;
  }
  clearReconnectTimer();

  let socket = null;
  try {
    socket = new WebSocket(WS_URL);
  } catch (err) {
    log('WS connect failed: ' + String(err));
    scheduleReconnect();
    return;
  }
  ws = socket;
  log('WS connecting to ' + WS_URL);

  socket.onopen = () => {
    if (ws !== socket) return;
    wsConnected = true;
    clearReconnectTimer();
    setWsBadge(true);
    renderStatus();
    log('WS connected to ' + WS_URL);
    sendWs({ type: 'getBrailleLine' });
    if (pendingStart && pendingStartGeneration === runGeneration && !runtime.stopped) {
      pendingStart = false;
      runStartedProgram(runGeneration).catch(err => log('Start failed: ' + err.message));
    }
  };

  socket.onclose = (ev) => {
    if (ws === socket) ws = null;
    wsConnected = false;
    setWsBadge(false);
    renderStatus();
    log('WS disconnected code=' + ev.code + ' reason=' + (ev.reason || '-'));
    scheduleReconnect();
  };

  socket.onerror = () => {
    log('WS error');
    scheduleReconnect();
  };

  socket.onmessage = async (ev) => {
    try {
      let raw = ev.data;
      if (typeof raw !== 'string') {
        if (raw && typeof raw.text === 'function') {
          raw = await raw.text();
        } else if (raw instanceof ArrayBuffer) {
          raw = new TextDecoder('utf-8').decode(raw);
        } else {
          log('WS ignored non-text message');
          return;
        }
      }
      const msg = JSON.parse(raw);
      await handleIncomingWs(msg);
    } catch (err) {
      log('WS parse error: ' + err.message);
    }
  };
}

function sendWs(obj) {
  const json = JSON.stringify(obj);
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log('WS not connected, skipped: ' + json);
    return false;
  }
  ws.send(json);
  log('WS IN  ' + json);
  return true;
}

function sendEnvelope(command, extra = {}) {
  return sendWs({ type: 'command', command, ...extra });
}

async function handleIncomingWs(msg) {
  log('WS OUT ' + JSON.stringify(msg));
  const type = wsEventType(msg);

  if (type === 'brailleLine') {
    const prevTextCaret = runtime.textCaret;
    const prevCellCaret = runtime.cellCaret;
    runtime.text = msg.sourceText ?? runtime.text;
    runtime.brailleUnicode = msg.braille?.unicodeText ?? '';
    runtime.textCaret = msg.meta?.caretTextPosition ?? msg.caret?.textIndex ?? runtime.textCaret;
    runtime.cellCaret = msg.meta?.caretCellPosition ?? msg.caret?.cellIndex ?? runtime.cellCaret;
    runtime.editorMode = msg.status?.editorMode ?? runtime.editorMode;
    runtime.insertMode = msg.status?.insertMode ?? runtime.insertMode;
    runtime.caretVisible = msg.caretVisible ?? runtime.caretVisible;
    runtime.activeTable = msg.meta?.activeTable ?? runtime.activeTable;
    runtime.lineId = msg.meta?.lineId ?? runtime.lineId;
    renderStatus();
    renderBrailleLine(msg);
    if (runtime.textCaret !== prevTextCaret || runtime.cellCaret !== prevCellCaret) {
      await dispatchEvent({
        type: 'cursorPositionChanged',
        position: runtime.textCaret,
        cell: runtime.cellCaret
      }, runGeneration);
    }
    return;
  }

  if (type === 'thumbKey') {
    const payload = wsPayload(msg);
    const name = payload.Name ?? payload.name ?? '';
    const press = !!(payload.Press ?? payload.press);
    runtime.lastThumbKey = normalizeThumb(name);
    renderStatus();
    if (press) {
      await dispatchEvent({ type: 'thumbKey', key: runtime.lastThumbKey }, runGeneration);
    }
    return;
  }

  if (type === 'editorKey') {
    const payload = wsPayload(msg);
    const key = payload.Key ?? payload.key ?? '';
    const press = !!(payload.Press ?? payload.press);
    runtime.lastEditorKey = key;
    renderStatus();
    if (press) {
      await dispatchEvent({ type: 'editorKey', key }, runGeneration);
    }
    return;
  }

  if (type === 'cursor') {
    const cursor = wsCursor(msg);
    runtime.lastCursorCell = cursor.CellIndex ?? cursor.cellIndex ?? runtime.lastCursorCell;
    runtime.textCaret = cursor.TextIndex ?? cursor.textIndex ?? runtime.textCaret;
    renderStatus();
    await dispatchEvent({
      type: 'cursorRouting',
      cell: runtime.lastCursorCell,
      textIndex: runtime.textCaret
    }, runGeneration);
    await dispatchEvent({
      type: 'cursorPositionChanged',
      position: runtime.textCaret,
      cell: runtime.lastCursorCell
    }, runGeneration);
    return;
  }

  if (type === 'chord') {
    runtime.lastChord = extractChord(msg);
    renderStatus();
    await dispatchEvent({ type: 'chord', dots: runtime.lastChord }, runGeneration);
    return;
  }
}

function normalizeThumb(name) {
  const s = String(name || '').toLowerCase();
  if (s.includes('left')) return 'left';
  if (s.includes('right')) return 'right';
  if (s.includes('up')) return 'up';
  if (s.includes('down')) return 'down';
  return s;
}

function extractChord(msg) {
  const payload = wsPayload(msg);
  const cursor = wsCursor(msg);
  const braille = wsField(msg, 'Braille', 'braille') || {};
  if (payload.Name != null) return String(payload.Name);
  if (payload.name != null) return String(payload.name);
  if (payload.Dots != null) return String(payload.Dots);
  if (payload.dots != null) return String(payload.dots);
  if (cursor.Character != null) return String(cursor.Character);
  if (cursor.character != null) return String(cursor.character);
  if (braille.CellChar != null) return String(braille.CellChar);
  if (braille.cellChar != null) return String(braille.cellChar);
  return '1';
}

async function runStartedProgram(generation) {
  if (!workspace) {
    log('Start blocked: Blockly workspace is not ready');
    return;
  }
  if (generation !== runGeneration || runtime.stopped) return;
  const startedBlocks = workspace.getTopBlocks(true).filter(b => b.type === 'event_when_started');
  if (startedBlocks.length === 0) {
    log('Start warning: no "when started" block found');
  }
  await dispatchEvent({ type: 'started' }, generation);
  sendWs({ type: 'getBrailleLine' });
}

function bindWsControls() {
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  if (connectBtn && !connectBtn.dataset.wsBound) {
    connectBtn.addEventListener('click', () => connectWs('manual'));
    connectBtn.dataset.wsBound = '1';
  }
  if (disconnectBtn && !disconnectBtn.dataset.wsBound) {
    disconnectBtn.addEventListener('click', disconnectWs);
    disconnectBtn.dataset.wsBound = '1';
  }
}

async function onRunClicked() {
  stopAllTimers();
  runtime.stopped = false;
  runGeneration++;
  const generation = runGeneration;
  renderStatus();

  if (!workspace) {
    log('Start blocked: Blockly workspace is not ready');
    return;
  }

  if (!isWsOpen()) {
    pendingStart = true;
    pendingStartGeneration = generation;
    log('Start queued: waiting for WS connection');
    connectWs('manual');
    return;
  }

  pendingStart = false;
  await runStartedProgram(generation);
}

function onStopClicked() {
  runtime.stopped = true;
  runGeneration++;
  pendingStart = false;
  stopAllTimers();
  stopSound();
  renderStatus();
  log('Runtime stopped');
}

function bindAppControls() {
  const bind = (id, eventName, handler) => {
    const el = document.getElementById(id);
    if (!el) return;
    const key = `bound_${eventName}`;
    if (el.dataset[key]) return;
    el.addEventListener(eventName, handler);
    el.dataset[key] = '1';
  };

  bind('runBtn', 'click', onRunClicked);
  bind('stopBtn', 'click', onStopClicked);
  bind('saveBtn', 'click', saveWorkspace);
  bind('saveAsBtn', 'click', saveWorkspaceAs);
  bind('loadBtn', 'click', openWorkspaceFile);
  bind('newBtn', 'click', newWorkspace);
  bind('fileInput', 'change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      currentFileHandle = null;
      loadWorkspaceFromText(reader.result, file.name);
    };
    reader.readAsText(file);
    e.target.value = '';
  });
  bind('simThumbLeftBtn', 'click', async () => {
    runtime.stopped = false;
    runGeneration++;
    await dispatchEvent({ type: 'thumbKey', key: 'left' }, runGeneration);
  });
  bind('simThumbRightBtn', 'click', async () => {
    runtime.stopped = false;
    runGeneration++;
    await dispatchEvent({ type: 'thumbKey', key: 'right' }, runGeneration);
  });
  bind('simCursor5Btn', 'click', async () => {
    runtime.stopped = false;
    runGeneration++;
    await dispatchEvent({ type: 'cursorRouting', cell: 5, textIndex: runtime.textCaret }, runGeneration);
  });
  bind('simChord1Btn', 'click', async () => {
    runtime.stopped = false;
    runGeneration++;
    await dispatchEvent({ type: 'chord', dots: '1' }, runGeneration);
  });
  bind('playSoundBtn', 'click', async () => {
    const input = document.getElementById('soundFileInput');
    await playSound(input ? input.value : '');
  });
  bind('stopSoundBtn', 'click', stopSound);

  const baseUrlBox = document.getElementById('soundBaseUrlBox');
  if (baseUrlBox && !baseUrlBox.dataset.initialized) {
    baseUrlBox.textContent = SOUND_BASE_URL;
    baseUrlBox.dataset.initialized = '1';
  }

  const fileNameInput = document.getElementById('fileNameInput');
  if (fileNameInput && !fileNameInput.dataset.initialized) {
    const savedName = localStorage.getItem(BLOCKLY_FILE_NAME_KEY);
    fileNameInput.value = normalizeXmlFileName(savedName || fileNameInput.value || 'braille-activity.xml');
    fileNameInput.addEventListener('change', () => {
      const normalized = normalizeXmlFileName(fileNameInput.value);
      fileNameInput.value = normalized;
      localStorage.setItem(BLOCKLY_FILE_NAME_KEY, normalized);
      currentFileHandle = null;
    });
    fileNameInput.dataset.initialized = '1';
  }
}

bindWsControls();
bindAppControls();
connectWs('manual');

function getVariableIdFromBlock(block) {
  const field = block.getField('VAR');
  const model = field?.getVariable();
  return model ? model.getId() : null;
}

function getVariableModelByName(name) {
  return workspace.getAllVariables().find(v => v.name === name) || null;
}

function patchVariableFieldIds(xmlDom) {
  const fields = xmlDom.querySelectorAll('field[name="VAR"]');
  fields.forEach(field => {
    const model = getVariableModelByName(field.textContent.trim());
    if (model) field.setAttribute('id', model.getId());
  });
}

/* ---------------- Evaluation ---------------- */
function highlightBlock(blockId) {
  workspace.highlightBlock(blockId);
  setTimeout(() => workspace.highlightBlock(null), 150);
}

function toNumber(v) {
  const n = Number(v);
  return Number.isNaN(n) ? 0 : n;
}

function evalValue(block) {
  if (!block) return null;

  switch (block.type) {
    case 'text':
      return block.getFieldValue('TEXT');

    case 'math_number':
      return Number(block.getFieldValue('NUM'));

    case 'logic_boolean':
      return block.getFieldValue('BOOL') === 'TRUE';

    case 'state_text_caret':
      return runtime.textCaret;

    case 'state_cell_caret':
      return runtime.cellCaret;

    case 'state_last_thumb_key':
      return runtime.lastThumbKey;

    case 'state_last_cursor_cell':
      return runtime.lastCursorCell;

    case 'state_last_chord':
      return runtime.lastChord;

    case 'state_last_editor_key':
      return runtime.lastEditorKey;

    case 'state_editor_mode':
      return runtime.editorMode;

    case 'state_insert_mode':
      return runtime.insertMode;

    case 'state_last_timer_name':
      return runtime.lastTimerName;

    case 'state_last_timer_tick':
      return runtime.lastTimerTick;

    case 'state_last_sound':
      return runtime.lastSound;

    case 'variables_get': {
      const id = getVariableIdFromBlock(block);
      return id ? (variableValues[id] ?? 0) : 0;
    }

    case 'math_arithmetic': {
      const a = toNumber(evalValue(block.getInputTargetBlock('A')));
      const b = toNumber(evalValue(block.getInputTargetBlock('B')));
      switch (block.getFieldValue('OP')) {
        case 'ADD': return a + b;
        case 'MINUS': return a - b;
        case 'MULTIPLY': return a * b;
        case 'DIVIDE': return b === 0 ? 0 : a / b;
        case 'POWER': return Math.pow(a, b);
        default: return 0;
      }
    }

    case 'logic_compare': {
      const a = evalValue(block.getInputTargetBlock('A'));
      const b = evalValue(block.getInputTargetBlock('B'));
      switch (block.getFieldValue('OP')) {
        case 'EQ': return a == b;
        case 'NEQ': return a != b;
        case 'LT': return a < b;
        case 'LTE': return a <= b;
        case 'GT': return a > b;
        case 'GTE': return a >= b;
        default: return false;
      }
    }

    case 'logic_operation': {
      const a = Boolean(evalValue(block.getInputTargetBlock('A')));
      const b = Boolean(evalValue(block.getInputTargetBlock('B')));
      return block.getFieldValue('OP') === 'AND' ? (a && b) : (a || b);
    }

    case 'logic_negate':
      return !Boolean(evalValue(block.getInputTargetBlock('BOOL')));

    case 'text_join': {
      const count = block.itemCount_ || 0;
      let out = '';
      for (let i = 0; i < count; i++) {
        out += String(evalValue(block.getInputTargetBlock('ADD' + i)) ?? '');
      }
      return out;
    }

    default:
      return null;
  }
}

/* ---------------- Execution ---------------- */
async function executeChain(startBlock, generation) {
  let current = startBlock;

  while (current && !runtime.stopped && generation === runGeneration) {
    highlightBlock(current.id);

    switch (current.type) {
      case 'bb_set_text': {
        const text = String(evalValue(current.getInputTargetBlock('TEXT')) ?? '');
        runtime.text = text;
        renderStatus();
        sendEnvelope('editorInput', {
          input: { kind: 'text', text, replace: true }
        });
        break;
      }

      case 'bb_append_text': {
        const text = String(evalValue(current.getInputTargetBlock('TEXT')) ?? '');
        runtime.text += text;
        renderStatus();
        sendEnvelope('editorInput', {
          input: { kind: 'text', text }
        });
        break;
      }

      case 'bb_send_key': {
        const key = current.getFieldValue('KEY');
        sendEnvelope('editorInput', {
          input: { kind: 'key', key }
        });
        break;
      }

      case 'bb_move_caret': {
        const by = toNumber(evalValue(current.getInputTargetBlock('DELTA')));
        const unit = current.getFieldValue('UNIT');
        sendWs({ type: 'moveCaret', by, unit });
        break;
      }

      case 'bb_set_caret': {
        const textIndex = toNumber(evalValue(current.getInputTargetBlock('INDEX')));
        sendWs({ type: 'setCaret', textIndex });
        break;
      }

      case 'bb_set_caret_from_cell': {
        const cellIndex = toNumber(evalValue(current.getInputTargetBlock('INDEX')));
        sendWs({ type: 'setCaretFromCell', cellIndex });
        break;
      }

      case 'bb_cursor_routing': {
        const cellIndex = toNumber(evalValue(current.getInputTargetBlock('INDEX')));
        sendWs({ type: 'cursorRouting', cellIndex });
        break;
      }

      case 'bb_set_editor_mode': {
        const enabled = current.getFieldValue('MODE') === 'on';
        runtime.editorMode = enabled ? 'on' : 'off';
        renderStatus();
        sendEnvelope('setEditorMode', { enabled });
        break;
      }

      case 'bb_set_insert_mode': {
        const enabled = current.getFieldValue('MODE') === 'on';
        runtime.insertMode = enabled ? 'on' : 'off';
        renderStatus();
        sendWs({ type: 'setEditorInsertMode', enabled });
        break;
      }

      case 'bb_set_caret_visibility': {
        const visible = current.getFieldValue('VISIBLE') === 'true';
        runtime.caretVisible = visible;
        renderStatus();
        sendWs({ type: 'setCaretVisibility', visible });
        break;
      }

      case 'bb_get_braille_line': {
        sendWs({ type: 'getBrailleLine' });
        break;
      }

      case 'bb_set_caret_to_begin': {
        sendWs({ type: 'setCaretToBegin' });
        break;
      }

      case 'bb_set_caret_to_end': {
        sendWs({ type: 'setCaretToEnd' });
        break;
      }

      case 'bb_wait': {
        const seconds = toNumber(evalValue(current.getInputTargetBlock('SECONDS')));
        await new Promise(resolve => setTimeout(resolve, seconds * 1000));
        break;
      }

      case 'bb_wait_ms': {
        const ms = Math.max(0, Math.floor(toNumber(evalValue(current.getInputTargetBlock('MILLISECONDS')))));
        await new Promise(resolve => setTimeout(resolve, ms));
        break;
      }

      case 'sound_play_file': {
        const file = current.getFieldValue('FILE');
        await playSound(file);
        break;
      }

      case 'sound_play_url': {
        const url = String(evalValue(current.getInputTargetBlock('URL')) ?? '');
        await playSound(url);
        break;
      }

      case 'sound_stop': {
        stopSound();
        break;
      }

      case 'sound_set_volume': {
        const percent = Math.max(0, Math.min(100, toNumber(evalValue(current.getInputTargetBlock('VOLUME')))));
        soundVolume = percent / 100;
        if (activeAudio) activeAudio.volume = soundVolume;
        log('Sound volume: ' + percent + '%');
        break;
      }

      case 'timer_start': {
        const name = current.getFieldValue('NAME');
        const seconds = Math.max(0.05, toNumber(evalValue(current.getInputTargetBlock('SECONDS'))));
        startTimer(name, seconds, generation);
        break;
      }

      case 'timer_stop': {
        const name = current.getFieldValue('NAME');
        stopTimerByName(name);
        break;
      }

      case 'timer_stop_all': {
        stopAllTimers();
        break;
      }

      case 'variables_set': {
        const id = getVariableIdFromBlock(current);
        const value = evalValue(current.getInputTargetBlock('VALUE'));
        if (id) {
          variableValues[id] = value;
          renderStatus();
        }
        break;
      }

      case 'variables_change': {
        const id = getVariableIdFromBlock(current);
        const delta = toNumber(evalValue(current.getInputTargetBlock('VALUE')));
        if (id) {
          variableValues[id] = toNumber(variableValues[id] ?? 0) + delta;
          renderStatus();
        }
        break;
      }

      case 'controls_if': {
        let handled = false;
        for (let i = 0; current.getInput('IF' + i); i++) {
          const cond = Boolean(evalValue(current.getInputTargetBlock('IF' + i)));
          if (cond) {
            const branch = current.getInputTargetBlock('DO' + i);
            if (branch) await executeChain(branch, generation);
            handled = true;
            break;
          }
        }
        if (!handled && current.getInput('ELSE')) {
          const elseBranch = current.getInputTargetBlock('ELSE');
          if (elseBranch) await executeChain(elseBranch, generation);
        }
        break;
      }

      case 'controls_repeat_ext': {
        const count = toNumber(evalValue(current.getInputTargetBlock('TIMES')));
        const body = current.getInputTargetBlock('DO');
        for (let i = 0; i < count && !runtime.stopped && generation === runGeneration; i++) {
          if (body) await executeChain(body, generation);
        }
        break;
      }

      default:
        log('Skipped unsupported block: ' + current.type);
        break;
    }

    current = current.getNextBlock();
  }
}

function eventMatches(block, event) {
  switch (block.type) {
    case 'event_when_started':
      return event.type === 'started';

    case 'event_when_timer':
      return event.type === 'timer' &&
        String(block.getFieldValue('NAME')) === String(event.name);

    case 'event_when_thumb_key':
      return event.type === 'thumbKey' &&
        String(block.getFieldValue('KEY')).toLowerCase() === String(event.key).toLowerCase();

    case 'event_when_any_thumb_key':
      return event.type === 'thumbKey';

    case 'event_when_cursor_routing':
      return event.type === 'cursorRouting' &&
        Number(block.getFieldValue('CELL')) === Number(event.cell);

    case 'event_when_cursor_position_changed':
      return event.type === 'cursorPositionChanged';

    case 'event_when_chord':
      return event.type === 'chord' &&
        String(block.getFieldValue('DOTS')) === String(event.dots);

    case 'event_when_editor_key':
      return event.type === 'editorKey' &&
        String(block.getFieldValue('KEY')) === String(event.key);

    default:
      return false;
  }
}

async function dispatchEvent(event, generation = runGeneration) {
  if (generation !== runGeneration || runtime.stopped) return;
  if (!workspace) return;

  if (event.type === 'thumbKey') {
    runtime.lastThumbKey = event.key ?? '';
  }
  if (event.type === 'cursorRouting') {
    runtime.lastCursorCell = Number(event.cell ?? -1);
    if (typeof event.textIndex === 'number') runtime.textCaret = event.textIndex;
  }
  if (event.type === 'cursorPositionChanged') {
    runtime.textCaret = Number(event.position ?? runtime.textCaret);
  }
  if (event.type === 'chord') {
    runtime.lastChord = String(event.dots ?? '');
  }
  if (event.type === 'editorKey') {
    runtime.lastEditorKey = String(event.key ?? '');
  }
  if (event.type === 'timer') {
    runtime.lastTimerName = String(event.name ?? '');
    runtime.lastTimerTick = Number(event.tick ?? runtime.lastTimerTick);
  }

  renderStatus();
  log('Event: ' + JSON.stringify(event));

  const topBlocks = workspace.getTopBlocks(true);
  for (const block of topBlocks) {
    if (generation !== runGeneration || runtime.stopped) return;
    if (eventMatches(block, event)) {
      const first = block.getInputTargetBlock('DO');
      if (first) await executeChain(first, generation);
    }
  }
}

/* ---------------- File actions ---------------- */
function saveWorkspace() {
  const xmlDom = Blockly.Xml.workspaceToDom(workspace);
  const xmlText = Blockly.Xml.domToPrettyText(xmlDom);
  const fileName = getSelectedFileName();

  if (currentFileHandle && typeof currentFileHandle.createWritable === 'function') {
    writeXmlToHandle(currentFileHandle, xmlText, fileName)
      .then(() => log('Workspace saved to ' + fileName))
      .catch(err => {
        log('Direct save failed: ' + err.message);
        downloadXml(xmlText, fileName);
      });
    return;
  }

  downloadXml(xmlText, fileName);
  log('Workspace saved as download: ' + fileName);
}

async function saveWorkspaceAs() {
  const xmlDom = Blockly.Xml.workspaceToDom(workspace);
  const xmlText = Blockly.Xml.domToPrettyText(xmlDom);
  const fileName = getSelectedFileName();

  if (typeof window.showSaveFilePicker !== 'function') {
    downloadXml(xmlText, fileName);
    log('Save As fallback download: ' + fileName);
    return;
  }

  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: fileName,
      types: [
        {
          description: 'Blockly XML',
          accept: { 'text/xml': ['.xml', '.blockly'] }
        }
      ]
    });
    const chosenName = normalizeXmlFileName(handle?.name || fileName);
    await writeXmlToHandle(handle, xmlText, chosenName);
    currentFileHandle = handle;
    setSelectedFileName(chosenName);
    log('Workspace saved as ' + chosenName);
  } catch (err) {
    if (err && err.name === 'AbortError') {
      log('Save As cancelled');
      return;
    }
    log('Save As failed: ' + err.message);
  }
}

function normalizeXmlFileName(name) {
  const raw = String(name || '').trim();
  if (!raw) return 'braille-activity.xml';
  return /\.(xml|blockly)$/i.test(raw) ? raw : (raw + '.xml');
}

function getSelectedFileName() {
  const input = document.getElementById('fileNameInput');
  return normalizeXmlFileName(input ? input.value : 'braille-activity.xml');
}

function setSelectedFileName(name) {
  const normalized = normalizeXmlFileName(name);
  const input = document.getElementById('fileNameInput');
  if (input) input.value = normalized;
  localStorage.setItem(BLOCKLY_FILE_NAME_KEY, normalized);
}

function downloadXml(xmlText, fileName) {
  const blob = new Blob([xmlText], { type: 'text/xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function writeXmlToHandle(handle, xmlText, fileName) {
  const writer = await handle.createWritable();
  await writer.write(xmlText);
  await writer.close();
  setSelectedFileName(fileName);
}

async function openWorkspaceFile() {
  if (typeof window.showOpenFilePicker === 'function') {
    try {
      const [handle] = await window.showOpenFilePicker({
        multiple: false,
        types: [
          {
            description: 'Blockly XML',
            accept: { 'text/xml': ['.xml', '.blockly'] }
          }
        ]
      });
      if (handle) {
        const file = await handle.getFile();
        const text = await file.text();
        currentFileHandle = handle;
        loadWorkspaceFromText(text, file.name);
        return;
      }
    } catch (err) {
      if (!(err && err.name === 'AbortError')) {
        log('Open failed: ' + err.message);
      }
      return;
    }
  }
  document.getElementById('fileInput').click();
}

function loadWorkspaceFromText(text, sourceName = null) {
  try {
    const xmlDom = Blockly.utils.xml.textToDom(text);
    workspace.clear();
    ensureDefaultVariable();
    patchVariableFieldIds(xmlDom);
    Blockly.Xml.domToWorkspace(xmlDom, workspace);
    initVariableValues();
    if (sourceName) setSelectedFileName(sourceName);
    log('Workspace loaded' + (sourceName ? ': ' + sourceName : ''));
  } catch (err) {
    log('Load failed: ' + err.message);
    alert('Could not load file');
  }
}

function newWorkspace() {
  if (!confirm('Clear current workspace?')) return;
  runtime.stopped = true;
  runGeneration++;
  stopAllTimers();
  stopSound();
  currentFileHandle = null;
  workspace.clear();
  ensureDefaultVariable();
  initVariableValues();
  renderBrailleLine(null);
  log('Workspace cleared');
}

renderStatus();
setWsBadge(false);
</script>
