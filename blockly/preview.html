<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BrailleStudio Blockly Sandbox</title>

  <script src="https://unpkg.com/blockly/blockly.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    #blocklyDiv {
      width: 100%;
      height: calc(100vh - 260px);
      min-height: 500px;
    }

    .small-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: #334155;
    }

    .field {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: white;
    }

    .btn {
      border-radius: 0.75rem;
      padding: 0.6rem 0.9rem;
      font-weight: 600;
      border: 1px solid #cbd5e1;
      background: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #f8fafc;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
      border-color: #dc2626;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .status-box {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.875rem;
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="max-w-7xl mx-auto p-4 space-y-4">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
      <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3">
        <div>
          <h1 class="text-2xl font-bold">BrailleStudio Blockly Sandbox</h1>
          <p class="text-slate-600">
            Save and load Blockly scripts and lessons online.
          </p>
        </div>
        <div class="text-sm text-slate-600">
          Current script:
          <span id="currentScriptLabel" class="font-semibold">none</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
      <div class="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-4 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3">
          <div>
            <label class="small-label" for="scriptIdInput">Script ID</label>
            <input id="scriptIdInput" class="field" type="text" placeholder="bal-intro" />
          </div>
          <div>
            <label class="small-label" for="scriptTitleInput">Script title</label>
            <input id="scriptTitleInput" class="field" type="text" placeholder="Bal intro" />
          </div>
          <div>
            <label class="small-label" for="scriptWordInput">Word</label>
            <input id="scriptWordInput" class="field" type="text" placeholder="bal" />
          </div>
          <div>
            <label class="small-label" for="scriptTypeInput">Type</label>
            <input id="scriptTypeInput" class="field" type="text" placeholder="intro" />
          </div>
        </div>

        <div class="flex flex-wrap gap-2">
          <button class="btn" id="newBtn">New</button>
          <button class="btn btn-primary" id="saveBtn">Save</button>
          <button class="btn" id="saveAsBtn">Save As</button>
          <button class="btn" id="loadBtn">Load Selected</button>
          <button class="btn btn-danger" id="deleteBtn">Delete Current</button>
          <button class="btn" id="refreshScriptsBtn">Refresh Scripts</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div>
            <label class="small-label" for="scriptsSelect">Scripts</label>
            <select id="scriptsSelect" class="field"></select>
          </div>
          <div>
            <label class="small-label" for="lessonsSelect">Lessons</label>
            <select id="lessonsSelect" class="field"></select>
          </div>
        </div>

        <div id="blocklyDiv" class="rounded-2xl border border-slate-200 overflow-hidden"></div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 space-y-4">
        <h2 class="text-xl font-bold">Lesson Builder</h2>

        <div class="space-y-3">
          <div>
            <label class="small-label" for="lessonIdInput">Lesson ID</label>
            <input id="lessonIdInput" class="field" type="text" placeholder="lesson-bal" />
          </div>
          <div>
            <label class="small-label" for="lessonTitleInput">Lesson title</label>
            <input id="lessonTitleInput" class="field" type="text" placeholder="Les bal" />
          </div>
          <div>
            <label class="small-label" for="lessonWordInput">Lesson word</label>
            <input id="lessonWordInput" class="field" type="text" placeholder="bal" />
          </div>
          <div>
            <label class="small-label" for="lessonStepsInput">Lesson steps (comma separated script IDs)</label>
            <textarea id="lessonStepsInput" class="field min-h-[120px]" placeholder="bal-intro, bal-listen, bal-build"></textarea>
          </div>
        </div>

        <div class="flex flex-wrap gap-2">
          <button class="btn btn-primary" id="saveLessonBtn">Save Lesson</button>
          <button class="btn" id="loadLessonBtn">Load Selected Lesson</button>
          <button class="btn" id="refreshLessonsBtn">Refresh Lessons</button>
        </div>

        <div class="space-y-2">
          <div class="small-label">Lesson steps preview</div>
          <ul id="lessonStepsPreview" class="list-disc pl-5 text-sm text-slate-700"></ul>
        </div>

        <div class="space-y-2">
          <div class="small-label">Status</div>
          <div id="statusBox" class="status-box bg-slate-50 border border-slate-200 rounded-xl p-3 min-h-[180px]"></div>
        </div>
      </div>
    </div>
  </div>

  <xml id="toolbox" style="display:none">
    <category name="Logic" colour="210">
      <block type="controls_if"></block>
      <block type="logic_compare"></block>
      <block type="logic_boolean"></block>
      <block type="logic_negate"></block>
    </category>

    <category name="Loops" colour="120">
      <block type="controls_repeat_ext">
        <value name="TIMES">
          <shadow type="math_number">
            <field name="NUM">3</field>
          </shadow>
        </value>
      </block>
      <block type="controls_whileUntil"></block>
      <block type="controls_for">
        <field name="VAR">i</field>
        <value name="FROM">
          <shadow type="math_number"><field name="NUM">1</field></shadow>
        </value>
        <value name="TO">
          <shadow type="math_number"><field name="NUM">10</field></shadow>
        </value>
        <value name="BY">
          <shadow type="math_number"><field name="NUM">1</field></shadow>
        </value>
      </block>
    </category>

    <category name="Math" colour="230">
      <block type="math_number"></block>
      <block type="math_arithmetic"></block>
      <block type="math_round"></block>
    </category>

    <category name="Text" colour="160">
      <block type="text"></block>
      <block type="text_print"></block>
      <block type="text_join"></block>
      <block type="text_length"></block>
    </category>

    <category name="Lists" colour="260">
      <block type="lists_create_with"></block>
      <block type="lists_length"></block>
      <block type="lists_getIndex"></block>
      <block type="lists_setIndex"></block>
    </category>

    <category name="Variables" colour="330" custom="VARIABLE"></category>
    <category name="Functions" colour="290" custom="PROCEDURE"></category>
  </xml>

  <script>
    const API_BASE = '/braillestudio/blockly-api';

    let workspace = null;
    let currentScriptId = null;
    let currentScriptTitle = '';

    const currentScriptLabel = document.getElementById('currentScriptLabel');
    const statusBox = document.getElementById('statusBox');

    const scriptIdInput = document.getElementById('scriptIdInput');
    const scriptTitleInput = document.getElementById('scriptTitleInput');
    const scriptWordInput = document.getElementById('scriptWordInput');
    const scriptTypeInput = document.getElementById('scriptTypeInput');
    const scriptsSelect = document.getElementById('scriptsSelect');

    const lessonIdInput = document.getElementById('lessonIdInput');
    const lessonTitleInput = document.getElementById('lessonTitleInput');
    const lessonWordInput = document.getElementById('lessonWordInput');
    const lessonStepsInput = document.getElementById('lessonStepsInput');
    const lessonsSelect = document.getElementById('lessonsSelect');
    const lessonStepsPreview = document.getElementById('lessonStepsPreview');

    function setStatus(message, data = null) {
      const text = data ? `${message}\n\n${JSON.stringify(data, null, 2)}` : message;
      statusBox.textContent = text;
      console.log(message, data || '');
    }

    function setCurrentScript(id, title = '') {
      currentScriptId = id || null;
      currentScriptTitle = title || '';

      currentScriptLabel.textContent = currentScriptId || 'none';

      scriptIdInput.value = currentScriptId || '';
      scriptTitleInput.value = currentScriptTitle || '';
    }

    function clearWorkspace() {
      workspace.clear();
    }

    async function saveScript(id, title, meta = {}, overwrite = true) {
      const state = Blockly.serialization.workspaces.save(workspace);

      const payload = {
        id,
        title,
        overwrite,
        blockly: state,
        meta
      };

      const res = await fetch('/braillestudio/blockly-api/save.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    async function loadScript(id) {
      const res = await fetch(`/braillestudio/blockly-api/load.php?id=${encodeURIComponent(id)}`);
      const data = await res.json();

      if (!data.ok && data.error) {
        throw new Error(data.error);
      }

      workspace.clear();
      Blockly.serialization.workspaces.load(data.blockly, workspace);
      return data;
    }

    async function listScripts() {
      const res = await fetch('/braillestudio/blockly-api/list.php');
      const data = await res.json();
      return data.items || [];
    }

    async function deleteScript(id) {
      const res = await fetch('/braillestudio/blockly-api/delete.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });

      return await res.json();
    }

    async function saveLesson(id, title, word, steps, meta = {}, overwrite = true) {
      const payload = {
        id,
        title,
        word,
        steps,
        meta,
        overwrite
      };

      const res = await fetch('/braillestudio/blockly-api/save_lesson.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      return await res.json();
    }

    async function loadLesson(id) {
      const res = await fetch(`/braillestudio/blockly-api/load_lesson.php?id=${encodeURIComponent(id)}`);
      return await res.json();
    }

    async function listLessons() {
      const res = await fetch('/braillestudio/blockly-api/list_lessons.php');
      const data = await res.json();
      return data.items || [];
    }

    function renderScriptsSelect(items) {
      scriptsSelect.innerHTML = '';

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '-- Select script --';
      scriptsSelect.appendChild(placeholder);

      for (const item of items) {
        const option = document.createElement('option');
        option.value = item.id;
        option.textContent = item.title
          ? `${item.id} — ${item.title}`
          : item.id;
        scriptsSelect.appendChild(option);
      }
    }

    function renderLessonsSelect(items) {
      lessonsSelect.innerHTML = '';

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '-- Select lesson --';
      lessonsSelect.appendChild(placeholder);

      for (const item of items) {
        const option = document.createElement('option');
        option.value = item.id;
        option.textContent = item.title
          ? `${item.id} — ${item.title}`
          : item.id;
        lessonsSelect.appendChild(option);
      }
    }

    function renderLessonStepsPreview(steps) {
      lessonStepsPreview.innerHTML = '';
      for (const step of steps) {
        const li = document.createElement('li');
        li.textContent = step;
        lessonStepsPreview.appendChild(li);
      }
    }

    function parseLessonStepsInput() {
      return lessonStepsInput.value
        .split(',')
        .map(s => s.trim())
        .filter(Boolean);
    }

    async function refreshScripts() {
      const items = await listScripts();
      renderScriptsSelect(items);
      return items;
    }

    async function refreshLessons() {
      const items = await listLessons();
      renderLessonsSelect(items);
      return items;
    }

    async function handleNew() {
      clearWorkspace();
      setCurrentScript(null, '');
      scriptIdInput.value = '';
      scriptTitleInput.value = '';
      scriptWordInput.value = '';
      scriptTypeInput.value = '';
      setStatus('New empty workspace created.');
    }

    async function onSave() {
      if (!currentScriptId) {
        return onSaveAs();
      }

      const result = await saveScript(
        currentScriptId,
        currentScriptTitle || currentScriptId,
        {
          word: scriptWordInput.value.trim() || 'bal',
          type: scriptTypeInput.value.trim() || 'intro'
        },
        true
      );

      if (!result.ok) {
        throw new Error(result.error || 'Failed to save script');
      }

      setStatus(`Saved script: ${currentScriptId}`, result);
      await refreshScripts();
      console.log(result);
    }

    async function onSaveAs() {
      const newId = prompt('New script id:', currentScriptId || scriptIdInput.value.trim() || '');
      if (!newId) return;

      const newTitle = prompt('Title:', currentScriptTitle || scriptTitleInput.value.trim() || newId) || newId;

      const result = await saveScript(
        newId,
        newTitle,
        {
          word: scriptWordInput.value.trim() || 'bal',
          type: scriptTypeInput.value.trim() || 'intro'
        },
        false
      );

      if (!result.ok) {
        throw new Error(result.error || 'Failed to save script');
      }

      currentScriptId = newId;
      currentScriptTitle = newTitle;
      setCurrentScript(newId, newTitle);
      setStatus(`Saved script as: ${newId}`, result);
      await refreshScripts();
      console.log(result);
    }

    async function handleLoadSelectedScript() {
      const id = scriptsSelect.value;
      if (!id) {
        setStatus('Please select a script first.');
        return;
      }
      const data = await loadScript(id);
      const title = data.title || id;
      const meta = data.meta || {};
      setCurrentScript(data.id || id, title);
      scriptWordInput.value = meta.word || '';
      scriptTypeInput.value = meta.type || '';
      setStatus(`Loaded script: ${id}`, data);
    }

    async function handleDeleteCurrent() {
      const id = currentScriptId || scriptIdInput.value.trim();
      if (!id) {
        setStatus('No current script selected.');
        return;
      }

      const ok = confirm(`Delete script "${id}"?`);
      if (!ok) return;

      const result = await deleteScript(id);
      if (!result.ok) {
        throw new Error(result.error || 'Failed to delete script');
      }
      if (currentScriptId === id) {
        setCurrentScript(null, '');
      }
      setStatus(`Deleted script: ${id}`, result);
      await refreshScripts();
    }

    async function handleSaveLesson() {
      const id = lessonIdInput.value.trim();
      const title = lessonTitleInput.value.trim() || id;
      const word = lessonWordInput.value.trim();
      const steps = parseLessonStepsInput();

      if (!id) {
        setStatus('Lesson ID is required.');
        return;
      }

      const result = await saveLesson(id, title, word, steps, {}, true);
      if (!result.ok) {
        throw new Error(result.error || 'Failed to save lesson');
      }

      renderLessonStepsPreview(steps);
      setStatus(`Saved lesson: ${id}`, result);
      await refreshLessons();
    }

    async function handleLoadSelectedLesson() {
      const id = lessonsSelect.value;
      if (!id) {
        setStatus('Please select a lesson first.');
        return;
      }
      const data = await loadLesson(id);
      if (!data.ok && data.error) {
        throw new Error(data.error);
      }

      lessonIdInput.value = data.id || '';
      lessonTitleInput.value = data.title || '';
      lessonWordInput.value = data.word || '';
      lessonStepsInput.value = (data.steps || []).join(', ');

      renderLessonStepsPreview(data.steps || []);
      setStatus(`Loaded lesson: ${id}`, data);
    }

    function initBlockly() {
      workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        trashcan: true,
        scrollbars: true,
        grid: {
          spacing: 20,
          length: 3,
          colour: '#e2e8f0',
          snap: true
        },
        zoom: {
          controls: true,
          wheel: true,
          startScale: 1.0,
          maxScale: 3,
          minScale: 0.3,
          scaleSpeed: 1.2
        }
      });
    }

    async function init() {
      initBlockly();

      document.getElementById('newBtn').addEventListener('click', handleNew);
      document.getElementById('saveBtn').addEventListener('click', onSave);
      document.getElementById('saveAsBtn').addEventListener('click', onSaveAs);
      document.getElementById('loadBtn').addEventListener('click', handleLoadSelectedScript);
      document.getElementById('deleteBtn').addEventListener('click', handleDeleteCurrent);
      document.getElementById('refreshScriptsBtn').addEventListener('click', refreshScripts);

      document.getElementById('saveLessonBtn').addEventListener('click', handleSaveLesson);
      document.getElementById('loadLessonBtn').addEventListener('click', handleLoadSelectedLesson);
      document.getElementById('refreshLessonsBtn').addEventListener('click', refreshLessons);

      lessonStepsInput.addEventListener('input', () => {
        renderLessonStepsPreview(parseLessonStepsInput());
      });

      scriptsSelect.addEventListener('change', () => {
        const id = scriptsSelect.value;
        if (id) {
          scriptIdInput.value = id;
        }
      });

      lessonsSelect.addEventListener('change', () => {
        const id = lessonsSelect.value;
        if (id) {
          lessonIdInput.value = id;
        }
      });

      try {
        await refreshScripts();
        await refreshLessons();
        setStatus('Ready.');
      } catch (err) {
        setStatus(`Startup error: ${err.message}`);
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
