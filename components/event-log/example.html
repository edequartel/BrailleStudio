<!doctype html>
<html lang="en">
<head>
  <!-- Favicons for browsers, Apple devices, Android, and installed web apps -->
  <link rel="icon" href="/braillestudio/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/braillestudio/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/braillestudio/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/braillestudio/apple-touch-icon.png">
  <link rel="manifest" href="/braillestudio/site.webmanifest">
  <meta charset="utf-8" />
  <title>Event log – dark mode</title>

  <meta name="color-scheme" content="light dark" />
  <link rel="stylesheet" href="event-log.css" />

  <style>
    @font-face {
      font-family: "Noto Sans";
      src: url("https://www.tastenbraille.com/braillestudio-data/assets/fonts/NotoSans-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Noto Sans";
      src: url("https://www.tastenbraille.com/braillestudio-data/assets/fonts/NotoSans-SemiBold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    body {
      margin: 0;
      padding: 1rem;
      background: #0b1220;
      color: #e6eaf2;
      font-family: "Noto Sans", Arial, sans-serif;
    }
  </style>
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.tastenbraille.com/braillestudio-data/opengraph/social-preview.png">
  <meta property="og:image:secure_url" content="https://www.tastenbraille.com/braillestudio-data/opengraph/social-preview.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1729">
  <meta property="og:image:height" content="910">
  <meta property="og:image:alt" content="BrailleStudio">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.tastenbraille.com/braillestudio-data/opengraph/social-preview.png">
  <meta name="twitter:image:alt" content="BrailleStudio">
</head>
<body>

  <!-- Empty container: component renders itself -->
  <div id="log"></div>

  <!-- Load component JS -->
  <script src="event-log.js"></script>

  <!-- Use the component -->
  <script>
    const log = new EventLog(document.getElementById("log"));

    log.log("Page loaded", "system");
    log.log("Left thumb pressed", "key");
    log.log("Routing button 8", "routing");
    log.log("Playing audio: letter-a.mp3", "audio");
    log.log("Example error", "error");
  </script>

  <script src="../log-visibility/log-visibility.js?v=20260622-1"></script>
</body>
</html>
