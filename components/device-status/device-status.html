<!doctype html>
<html lang="en">
<head>
  <!-- Favicons for browsers, Apple devices, Android, and installed web apps -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Device status demo</title>

  <!-- CSS: same folder -->
  <link rel="stylesheet" href="./device-status.css" />

  <style>
    @font-face {
      font-family: "Noto Sans";
      src: url("https://www.tastenbraille.com/braillestudio-data/assets/fonts/NotoSans-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Noto Sans";
      src: url("https://www.tastenbraille.com/braillestudio-data/assets/fonts/NotoSans-SemiBold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    body {
      margin: 0;
      padding: 1rem;
      font-family: "Noto Sans", Arial, sans-serif;
    }
  </style>
</head>
<body>

  <!-- MUST exist -->
  <div id="deviceStatus"></div>

  <!-- JS: same folder -->
  <script src="./device-status.js"></script>

  <script>
    // Safety check
    if (typeof DeviceStatus === "undefined") {
      document.getElementById("deviceStatus").textContent =
        "ERROR: device-status.js not loaded";
    } else {
      const ds = new DeviceStatus({
        containerId: "deviceStatus",
        label: "Braille display",
        initialState: "connecting",
        initialText: "Connecting..."
      });

      // Visual proof it works
      setTimeout(() => {
        ds.setState("connected", "Focus 40 (USB)");
      }, 1500);
    }
  </script>

</body>
</html>
