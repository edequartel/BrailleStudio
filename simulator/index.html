<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BrailleBridge Simulator v2.3</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    button { margin: 4px; padding: 8px 12px; }
    pre, textarea { width: 100%; box-sizing: border-box; font-family: Consolas, monospace; }
    pre { min-height: 180px; background: #f6f6f6; padding: 10px; white-space: pre-wrap; }
    textarea { min-height: 140px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
  <h1>BrailleBridge Simulator v2.3</h1>

  <div class="row">
    <button id="connectBtn">Connect simulator</button>
    <button id="getLineBtn">getBrailleLine</button>
    <button id="thumbLeftBtn">thumbKey Left</button>
    <button id="thumbRightBtn">thumbKey Right</button>
    <button id="editorLeftBtn">editorKey ArrowLeft</button>
    <button id="editorRightBtn">editorKey ArrowRight</button>
    <button id="cursor5Btn">cursor cell 5</button>
    <button id="chord1Btn">chord 1</button>
  </div>

  <div class="row">
    <textarea id="commandBox">
{"type":"command","command":"editorInput","input":{"kind":"text","text":"Hello braille","replace":true}}
    </textarea>
  </div>

  <div class="row">
    <button id="sendBtn">Send command JSON</button>
  </div>

  <div class="grid">
    <div>
      <h3>Current simulator state</h3>
      <pre id="stateBox"></pre>
    </div>
    <div>
      <h3>Event log</h3>
      <pre id="logBox"></pre>
    </div>
  </div>

<script>
class BrailleBridgeSimulator {
  constructor(options = {}) {
    this.displayCells = 40;
    this.activeTable = options.activeTable || "nl-NL-g0.utb";
    this.charSize = 0;
    this.lineId = 1;
    this.listeners = new Set();

    this.state = {
      sourceText: "",
      caretTextIndex: 0,
      caretCellIndex: 0,
      editorMode: "off",
      insertMode: "off",
      caretVisible: true,
      caretStyle: {
        dots: [7, 8],
        blink: false,
        blinkPeriodMs: 500
      }
    };
  }

  // ---------- public event API ----------
  connect(listener) {
    this.listeners.add(listener);
    return () => this.listeners.delete(listener);
  }

  emit(msg) {
    for (const listener of this.listeners) {
      listener(structuredClone(msg));
    }
  }

  // ---------- helpers ----------
  nowUtc() {
    return new Date().toISOString();
  }

  sam(msgType, param = 0) {
    return {
      MsgType: msgType,
      UnitId: 1,
      Strip: 0,
      Param: param
    };
  }

  clamp(n, min, max) {
    return Math.max(min, Math.min(max, n));
  }

  normalizeIncomingType(msg) {
    return msg?.Type ?? msg?.type ?? "";
  }

  normalizeCommand(msg) {
    const t = this.normalizeIncomingType(msg);
    if (t === "command") return msg.command || "";
    return t;
  }

  getTextLength() {
    return this.state.sourceText.length;
  }

  mapTextIndexToCellIndex(textIndex) {
    return this.clamp(textIndex, 0, this.displayCells);
  }

  mapCellIndexToTextIndex(cellIndex) {
    return this.clamp(cellIndex, 0, this.getTextLength());
  }

  padOrTrimText(s, len = this.displayCells) {
    const str = String(s ?? "");
    if (str.length >= len) return str.slice(0, len);
    return str + " ".repeat(len - str.length);
  }

  // very simple placeholder mapping: one text char -> one braille cell
  // You can later replace this with a real translator.
  textToPseudoBraille(text) {
    const out = [];
    for (const ch of text) {
      if (ch === " ") out.push("\u2800");
      else out.push("\u2801");
    }
    return out.join("");
  }

  buildBrailleLine() {
    const paddedText = this.padOrTrimText(this.state.sourceText, this.displayCells);
    const paddedBraille = this.padOrTrimText(this.textToPseudoBraille(this.state.sourceText), this.displayCells);

    return {
      type: "brailleLine",
      ok: true,
      sourceText: paddedText,
      braille: {
        unicodeText: paddedBraille
      },
      caret: {
        textIndex: this.state.caretTextIndex,
        cellIndex: this.state.caretCellIndex
      },
      caretVisible: this.state.caretVisible,
      caretStyle: structuredClone(this.state.caretStyle),
      status: {
        editorMode: this.state.editorMode,
        insertMode: this.state.insertMode,
        blink: this.state.caretStyle.blink ? "on" : "off",
        caret: this.state.caretVisible ? "on" : "off"
      },
      meta: {
        activeTable: this.activeTable,
        charSize: this.charSize,
        lineId: this.lineId++,
        createdUtc: this.nowUtc(),
        lineLength: this.state.sourceText.length,
        brailleDisplayCells: 40,
        sscoTextLength: this.state.sourceText.length,
        sscoBrailleLength: this.state.sourceText.length,
        caretTextPosition: this.state.caretTextIndex,
        caretCellPosition: this.state.caretCellIndex
      }
    };
  }

  syncCaretFromTextIndex() {
    this.state.caretTextIndex = this.clamp(this.state.caretTextIndex, 0, this.getTextLength());
    this.state.caretCellIndex = this.mapTextIndexToCellIndex(this.state.caretTextIndex);
  }

  syncCaretFromCellIndex() {
    this.state.caretCellIndex = this.clamp(this.state.caretCellIndex, 0, this.displayCells);
    this.state.caretTextIndex = this.mapCellIndexToTextIndex(this.state.caretCellIndex);
  }

  broadcastBrailleLine() {
    this.emit(this.buildBrailleLine());
  }

  // ---------- incoming command handling ----------
  send(rawMsg) {
    const msg = typeof rawMsg === "string" ? JSON.parse(rawMsg) : rawMsg;
    const command = this.normalizeCommand(msg);

    switch (command) {
      case "setEditorMode": {
        this.state.editorMode = msg.enabled ? "on" : "off";
        this.broadcastBrailleLine();
        return;
      }

      case "setEditorInsertMode": {
        this.state.insertMode = msg.enabled ? "on" : "off";
        this.broadcastBrailleLine();
        return;
      }

      case "editorInput": {
        const input = msg.input || {};
        const kind = input.kind;

        if (kind === "text") {
          const text = String(input.text ?? "");
          const replace = input.replace === true || input.replace === "true";

          if (replace) {
            this.state.sourceText = text;
            this.state.caretTextIndex = text.length;
            this.syncCaretFromTextIndex();
            this.broadcastBrailleLine();
            return;
          }

          if (this.state.insertMode === "on") {
            const i = this.state.caretTextIndex;
            this.state.sourceText =
              this.state.sourceText.slice(0, i) +
              text +
              this.state.sourceText.slice(i);
            this.state.caretTextIndex = i + text.length;
          } else {
            const i = this.state.caretTextIndex;
            this.state.sourceText =
              this.state.sourceText.slice(0, i) +
              text +
              this.state.sourceText.slice(i + text.length);
            this.state.caretTextIndex = i + text.length;
          }

          this.syncCaretFromTextIndex();
          this.broadcastBrailleLine();
          return;
        }

        if (kind === "braille") {
          const unicode = String(input.unicode ?? "");
          // simulator fallback: append a placeholder
          this.state.sourceText += unicode ? "*" : "";
          this.state.caretTextIndex = this.state.sourceText.length;
          this.syncCaretFromTextIndex();
          this.broadcastBrailleLine();
          return;
        }

        if (kind === "key") {
          const key = String(input.key ?? "");
          this.applyEditorKey(key);
          return;
        }

        return;
      }

      case "setCaret": {
        this.state.caretTextIndex = this.clamp(Number(msg.textIndex ?? 0), 0, this.getTextLength());
        this.syncCaretFromTextIndex();
        this.broadcastBrailleLine();
        return;
      }

      case "moveCaret": {
        const by = Number(msg.by ?? 0);
        const unit = String(msg.unit ?? "character");

        if (unit === "cell") {
          this.state.caretCellIndex = this.clamp(this.state.caretCellIndex + by, 0, 40);
          this.syncCaretFromCellIndex();
        } else {
          this.state.caretTextIndex = this.clamp(this.state.caretTextIndex + by, 0, this.getTextLength());
          this.syncCaretFromTextIndex();
        }

        this.broadcastBrailleLine();
        return;
      }

      case "setCaretFromCell": {
        this.state.caretCellIndex = this.clamp(Number(msg.cellIndex ?? 0), 0, 40);
        this.syncCaretFromCellIndex();
        this.broadcastBrailleLine();
        return;
      }

      case "setCaretVisibility": {
        this.state.caretVisible = !!msg.visible;
        this.broadcastBrailleLine();
        return;
      }

      case "setCaretStyle": {
        if (Array.isArray(msg.dots)) this.state.caretStyle.dots = [...msg.dots];
        if (typeof msg.blink === "boolean") this.state.caretStyle.blink = msg.blink;
        if (typeof msg.blinkPeriodMs === "number") this.state.caretStyle.blinkPeriodMs = msg.blinkPeriodMs;
        this.broadcastBrailleLine();
        return;
      }

      case "getBrailleLine": {
        this.broadcastBrailleLine();
        return;
      }

      case "setCaretToEnd": {
        this.state.caretTextIndex = this.getTextLength();
        this.syncCaretFromTextIndex();
        this.broadcastBrailleLine();
        return;
      }

      case "setCaretToBegin": {
        this.state.caretTextIndex = 0;
        this.syncCaretFromTextIndex();
        this.broadcastBrailleLine();
        return;
      }

      case "cursorRouting": {
        const cellIndex = this.clamp(Number(msg.cellIndex ?? 0), 0, 40);
        this.simulateCursorRouting(cellIndex);
        return;
      }

      default:
        // ignore safely
        return;
    }
  }

  applyEditorKey(key) {
    const k = String(key);

    if (k === "ArrowLeft") {
      this.send({ type: "moveCaret", by: -1, unit: "character" });
      return;
    }
    if (k === "ArrowRight") {
      this.send({ type: "moveCaret", by: 1, unit: "character" });
      return;
    }
    if (k === "ArrowUp") {
      this.send({ type: "moveCaret", by: -1, unit: "cell" });
      return;
    }
    if (k === "ArrowDown") {
      this.send({ type: "moveCaret", by: 1, unit: "cell" });
      return;
    }

    if (this.state.editorMode !== "on") {
      this.broadcastBrailleLine();
      return;
    }

    if (k === "Backspace") {
      const i = this.state.caretTextIndex;
      if (i > 0) {
        this.state.sourceText =
          this.state.sourceText.slice(0, i - 1) +
          this.state.sourceText.slice(i);
        this.state.caretTextIndex = i - 1;
      }
      this.syncCaretFromTextIndex();
      this.broadcastBrailleLine();
      return;
    }

    if (k === "Delete" || k === "DEL") {
      const i = this.state.caretTextIndex;
      if (i < this.state.sourceText.length) {
        this.state.sourceText =
          this.state.sourceText.slice(0, i) +
          this.state.sourceText.slice(i + 1);
      }
      this.syncCaretFromTextIndex();
      this.broadcastBrailleLine();
      return;
    }

    if (k === "Space") {
      this.send({
        type: "command",
        command: "editorInput",
        input: { kind: "text", text: " " }
      });
      return;
    }

    if (k === "Enter") {
      this.send({
        type: "command",
        command: "editorInput",
        input: { kind: "text", text: "\\n" }
      });
      return;
    }

    this.broadcastBrailleLine();
  }

  // ---------- simulated server->client events ----------
  simulateThumbKey(name = "LeftThumb", press = true) {
    this.emit({
      Type: "thumbKey",
      Ok: true,
      TimestampUtc: this.nowUtc(),
      Payload: {
        Name: name,
        Press: !!press
      },
      Sam: this.sam(11, 0)
    });
  }

  simulateEditorKey(key = "ArrowLeft", press = true) {
    this.emit({
      Type: "editorKey",
      Ok: true,
      TimestampUtc: this.nowUtc(),
      Payload: {
        Key: key,
        Press: !!press
      },
      Sam: this.sam(8, 2097152)
    });
  }

  simulateCursorRouting(cellIndex = 0) {
    cellIndex = this.clamp(cellIndex, 0, 40);
    const textIndex = this.mapCellIndexToTextIndex(cellIndex);
    const ch = this.state.sourceText[textIndex] ?? "";

    this.emit({
      Type: "cursor",
      Ok: true,
      TimestampUtc: this.nowUtc(),
      SourceText: this.padOrTrimText(this.state.sourceText, this.displayCells),
      Table: this.activeTable,
      Cursor: {
        CellIndex: cellIndex,
        TextIndex: textIndex,
        Character: ch,
        CharacterCodePoint: ch ? "U+" + ch.codePointAt(0).toString(16).toUpperCase().padStart(4, "0") : "",
        Word: this.findWordAt(textIndex)
      },
      Braille: {
        CellChar: this.textToPseudoBraille(ch || " ").slice(0, 1) || "\u2800",
        CellCodePoint: "U+2801",
        IsCapitalSign: false,
        IsNumberSign: false,
        IsCapitalWordSign: false,
        CapitalSignActive: false,
        CapitalWordSignActive: false,
        NumberSignActive: false
      },
      Sam: this.sam(9, 0)
    });

    // hardware cursor-routing usually also updates caret
    this.state.caretCellIndex = cellIndex;
    this.state.caretTextIndex = textIndex;
    this.broadcastBrailleLine();
  }

  simulateChord(dots = "1") {
    const textIndex = this.state.caretTextIndex;
    const ch = this.state.sourceText[textIndex] ?? "";

    this.emit({
      Type: "chord",
      Ok: true,
      TimestampUtc: this.nowUtc(),
      SourceText: this.padOrTrimText(this.state.sourceText, this.displayCells),
      Table: this.activeTable,
      Cursor: {
        CellIndex: this.state.caretCellIndex,
        TextIndex: this.state.caretTextIndex,
        Character: ch,
        CharacterCodePoint: ch ? "U+" + ch.codePointAt(0).toString(16).toUpperCase().padStart(4, "0") : "",
        Word: this.findWordAt(textIndex)
      },
      Braille: {
        CellChar: "\u2801",
        CellCodePoint: "U+2801",
        IsCapitalSign: false,
        IsNumberSign: false,
        IsCapitalWordSign: false,
        CapitalSignActive: false,
        CapitalWordSignActive: false,
        NumberSignActive: false
      },
      Sam: this.sam(9, 0),
      Payload: {
        Name: dots
      }
    });
  }

  findWordAt(index) {
    const text = this.state.sourceText;
    if (!text) return "";
    const parts = text.split(/\s+/).filter(Boolean);
    for (const word of parts) {
      const pos = text.indexOf(word);
      if (index >= pos && index <= pos + word.length) return word;
    }
    return "";
  }
}

// ---------- demo wiring ----------
const sim = new BrailleBridgeSimulator();

const logBox = document.getElementById("logBox");
const stateBox = document.getElementById("stateBox");
const commandBox = document.getElementById("commandBox");

function log(text) {
  logBox.textContent += text + "\n";
  logBox.scrollTop = logBox.scrollHeight;
}

function renderState() {
  stateBox.textContent = JSON.stringify({
    sourceText: sim.state.sourceText,
    caretTextIndex: sim.state.caretTextIndex,
    caretCellIndex: sim.state.caretCellIndex,
    editorMode: sim.state.editorMode,
    insertMode: sim.state.insertMode,
    caretVisible: sim.state.caretVisible,
    caretStyle: sim.state.caretStyle
  }, null, 2);
}

sim.connect((msg) => {
  log("SIM OUT " + JSON.stringify(msg));
  renderState();
});

document.getElementById("connectBtn").onclick = () => {
  log("Simulator connected");
  sim.broadcastBrailleLine();
};

document.getElementById("getLineBtn").onclick = () => sim.send({ type: "getBrailleLine" });
document.getElementById("thumbLeftBtn").onclick = () => sim.simulateThumbKey("LeftThumb", true);
document.getElementById("thumbRightBtn").onclick = () => sim.simulateThumbKey("RightThumb", true);
document.getElementById("editorLeftBtn").onclick = () => sim.simulateEditorKey("ArrowLeft", true);
document.getElementById("editorRightBtn").onclick = () => sim.simulateEditorKey("ArrowRight", true);
document.getElementById("cursor5Btn").onclick = () => sim.simulateCursorRouting(5);
document.getElementById("chord1Btn").onclick = () => sim.simulateChord("1");

document.getElementById("sendBtn").onclick = () => {
  try {
    const msg = JSON.parse(commandBox.value);
    log("SIM IN  " + JSON.stringify(msg));
    sim.send(msg);
  } catch (err) {
    log("JSON parse error: " + err.message);
  }
};

renderState();
</script>
</body>
</html>
