<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lesson Builder Redirect</title>
  <style>
    :root {
      --bg: #eff6ff;
      --panel: rgba(255, 255, 255, 0.88);
      --border: rgba(148, 163, 184, 0.22);
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.35), transparent 32%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.2), transparent 28%),
        linear-gradient(135deg, #eff6ff 0%, #f8fafc 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(560px, 100%);
      padding: 32px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 18px 50px rgba(37, 99, 235, 0.12);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }

    h1 {
      margin: 20px 0 10px;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .link {
      display: inline-block;
      margin-top: 18px;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.35); opacity: 0.6; }
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="badge"><span class="dot"></span>Loading</div>
    <h1>Lesson Builder</h1>
    <p>De lessonbuilder wordt geopend. Als de redirect niet direct werkt, kun je hieronder handmatig verdergaan.</p>
    <a class="link" href="https://www.tastenbraille.com/braillestudio/lessonbuilder/lessonbuilder.php">Open lessonbuilder.php</a>
  </main>

  <script>
    window.location.replace('https://www.tastenbraille.com/braillestudio/lessonbuilder/lessonbuilder.php');
  </script>
</body>
</html>
