<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Braille Start">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon-start.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon-start.svg">
  <title>Scan Step-link</title>
  <style>
    :root {
      --bg: #eef3f9;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --border: #d6deea;
      --text: #16202f;
      --muted: #64748b;
      --blue: #1d4ed8;
      --blue-dark: #173fb0;
      --green: #15803d;
      --red: #b91c1c;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(29, 78, 216, 0.10), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card + .card {
      margin-top: 18px;
    }

    h1, h2 {
      margin: 0 0 12px;
    }

    h1 {
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: 18px;
    }

    p {
      margin: 0 0 10px;
      line-height: 1.5;
      color: var(--muted);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      background: white;
      color: var(--text);
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: rgba(29, 78, 216, 0.55);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.12);
    }

    .field + .field {
      margin-top: 14px;
    }

    .field--primary {
      margin-bottom: 22px;
    }

    .pair {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button, a.button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 11px 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    button:hover, a.button-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    .btn-blue {
      background: var(--blue);
      border-color: var(--blue);
      color: white;
    }

    .btn-blue:hover {
      background: var(--blue-dark);
      border-color: var(--blue-dark);
    }

    .mono {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #f8fafc;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .mono-log {
      min-height: 160px;
      max-height: 360px;
      overflow: auto;
    }
    .video-wrap {
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: #0f172a;
      aspect-ratio: 4 / 3;
      position: relative;
    }
    .video-wrap::before {
      content: "Camera preview";
      position: absolute;
      left: 12px;
      top: 12px;
      z-index: 1;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(226, 232, 240, 0.92);
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .is-hidden {
      display: none;
    }

    .actions-row {
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .actions-row > button {
      width: 100%;
    }

    .panel-toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 0;
      margin-bottom: 12px;
    }
    .page-footer {
      display: flex;
      justify-content: center;
      padding: 4px 20px 28px;
    }
    .footer-logo {
      width: 132px;
      height: auto;
      opacity: 0.92;
    }

    .error {
      color: var(--red);
    }

    .success {
      color: var(--green);
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px 14px 28px;
      }

      .card {
        padding: 18px;
        border-radius: 18px;
      }

      .actions-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="card">
      <h1>Scan Step-link</h1>
      <div class="field field--primary">
        <input id="stepLinkCodeInput" type="text" placeholder="abc123">
      </div>
      <div id="cameraField" class="field is-hidden">
        <label>Camera scan</label>
        <div class="video-wrap">
          <video id="scannerVideo" playsinline muted class="is-hidden"></video>
          <canvas id="scannerCanvas" class="is-hidden"></canvas>
        </div>
      </div>
      <div class="btn-row actions-row">
        <button id="startScanBtn" type="button">Scan</button>
        <button id="resolveBtn" class="btn-blue" type="button">Start</button>
      </div>
    </section>

    <section class="card">
      <h2>Resolved Response</h2>
      <div class="panel-toggle-row">
        <button id="togglePayloadBtn" type="button">Unhide response</button>
      </div>
      <pre id="payloadBox" class="mono is-hidden">No resolved payload yet.</pre>
    </section>

    <section class="card">
      <h2>Logging</h2>
      <div class="panel-toggle-row">
        <button id="toggleLogBtn" type="button">Unhide log</button>
        <button id="clearLogBtn" type="button">Clear log</button>
        <button id="copyLogBtn" type="button">Copy log</button>
      </div>
      <pre id="logBox" class="mono mono-log is-hidden">Ready.</pre>
    </section>
  </div>

  <footer class="page-footer" aria-label="Bartiméus">
    <img class="footer-logo" src="https://www.tastenbraille.com/braillestudio/assets/bartimeus.png" alt="Bartiméus">
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <script>
    const STORAGE_SESSION_KEY = 'braillestudio_session_api_active_session';
    const STORAGE_RESOLVED_KEY = 'braillestudio_session_api_last_resolved';

    const params = new URLSearchParams(location.search);
    const urlCode = String(params.get('code') || '').trim();
    const urlSessionId = String(params.get('sessionId') || '').trim();
    const $ = (id) => document.getElementById(id);
    let activeScannerStream = null;
    let scanTimer = null;
    let scanHandled = false;
    let startRequestInFlight = false;

    function copyText(text) {
      if (navigator.clipboard?.writeText) {
        return navigator.clipboard.writeText(String(text || ''));
      }
      const temp = document.createElement('textarea');
      temp.value = String(text || '');
      temp.setAttribute('readonly', 'readonly');
      temp.style.position = 'absolute';
      temp.style.left = '-9999px';
      document.body.appendChild(temp);
      temp.select();
      document.execCommand('copy');
      document.body.removeChild(temp);
      return Promise.resolve();
    }

    function safeJsonParse(raw, fallback = null) {
      try {
        return JSON.parse(raw);
      } catch (err) {
        return fallback;
      }
    }

    function logLine(message, data) {
      const box = $('logBox');
      if (!box) return;
      const timestamp = new Date().toLocaleTimeString('nl-NL', { hour12: false });
      let line = `[${timestamp}] ${String(message || '').trim()}`;
      if (typeof data !== 'undefined') {
        try {
          line += `\n${JSON.stringify(data, null, 2)}`;
        } catch {
          line += `\n${String(data)}`;
        }
      }
      box.textContent = box.textContent.trim()
        ? `${box.textContent}\n${line}`
        : line;
      box.scrollTop = box.scrollHeight;
    }

    function getActiveSession() {
      return safeJsonParse(localStorage.getItem(STORAGE_SESSION_KEY) || '', null);
    }

    function getInitialSessionId() {
      if (urlSessionId) {
        return urlSessionId;
      }
      const session = getActiveSession();
      return String(session?.sessionId || '').trim();
    }

    function setLogVisibility(visible) {
      const box = $('logBox');
      const button = $('toggleLogBtn');
      if (!box || !button) return;
      box.classList.toggle('is-hidden', !visible);
      button.textContent = visible ? 'Hide log' : 'Unhide log';
    }

    function setPayloadVisibility(visible) {
      const box = $('payloadBox');
      const button = $('togglePayloadBtn');
      if (!box || !button) return;
      box.classList.toggle('is-hidden', !visible);
      button.textContent = visible ? 'Hide response' : 'Unhide response';
    }

    function getSessionIdOrThrow() {
      const sessionId = getInitialSessionId();
      if (!sessionId) {
        throw new Error('No session id found in this QR link.');
      }
      return sessionId;
    }

    function normalizeStepLinkCode(rawValue) {
      const value = String(rawValue || '').trim();
      if (!value) return '';
      try {
        const url = new URL(value);
        const fromQuery = String(url.searchParams.get('code') || '').trim();
        if (fromQuery) return fromQuery;
        const parts = url.pathname.split('/').filter(Boolean);
        return String(parts[parts.length - 1] || '').trim();
      } catch {
        return value;
      }
    }

    async function postJson(url, payload) {
      logLine('POST request started.', { url, payload });
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload || {})
      });
      const data = await res.json().catch(() => ({}));
      logLine('POST response received.', {
        url,
        status: res.status,
        ok: Boolean(res.ok),
        data
      });
      if (!res.ok || !data.ok) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }
      return data;
    }

    function setStatus(message, className = '') {
      void message;
      void className;
    }

    function setBusyState(isBusy) {
      startRequestInFlight = Boolean(isBusy);
      $('resolveBtn').disabled = startRequestInFlight;
      $('startScanBtn').disabled = startRequestInFlight;
      $('stepLinkCodeInput').disabled = startRequestInFlight;
    }

    async function submitStepLink(source = 'manual') {
      if (startRequestInFlight) {
        logLine('Start request ignored because another request is in flight.', { source });
        return;
      }

      const sessionId = getSessionIdOrThrow();
      const stepLinkCode = normalizeStepLinkCode($('stepLinkCodeInput').value);
      if (!stepLinkCode) {
        throw new Error('Enter a step-link id / code first.');
      }

      setBusyState(true);
      $('stepLinkCodeInput').value = stepLinkCode;
      stopScanner();
      logLine('Submitting step-link.', {
        source,
        sessionId,
        code: stepLinkCode
      });

      try {
        setStatus('Starting step-link...');
        const response = await postJson('./resolve.php', {
          sessionId,
          code: stepLinkCode
        });

        if (response.accepted === false && response.ignored === true) {
          $('payloadBox').textContent = JSON.stringify(response, null, 2);
          setStatus('Laptop is bezig. Deze step-link is genegeerd.', 'success');
          logLine('Step-link ignored because laptop session is active.', response);
          return;
        }

        localStorage.setItem(STORAGE_RESOLVED_KEY, JSON.stringify(response));
        $('payloadBox').textContent = JSON.stringify(response, null, 2);
        setStatus(`Started step-link ${response.code}.`, 'success');
        logLine('Step-link started successfully.', response);
      } finally {
        setBusyState(false);
      }
    }

    async function handleScannedValue(rawValue) {
      const code = normalizeStepLinkCode(rawValue);
      if (!code || scanHandled || startRequestInFlight) {
        return;
      }
      scanHandled = true;
      $('stepLinkCodeInput').value = code;
      logLine('Camera scan detected step-link code.', { rawValue, code });
      try {
        await submitStepLink('scanner');
      } catch (err) {
        scanHandled = false;
        logLine('Automatic start after scan failed.', { message: err.message || String(err) });
        setStatus(err.message || String(err), 'error');
      }
    }

    function detectQrWithJsQr(video) {
      const canvas = $('scannerCanvas');
      if (!canvas || !video?.videoWidth || !video?.videoHeight || typeof window.jsQR !== 'function') {
        return '';
      }
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const context = canvas.getContext('2d', { willReadFrequently: true });
      if (!context) {
        return '';
      }
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
      const result = window.jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      return String(result?.data || '').trim();
    }

    async function scanFrame() {
      const video = $('scannerVideo');
      if (!video || video.readyState < 2) {
        return;
      }
      let value = '';
      if (typeof BarcodeDetector !== 'undefined') {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const barcodes = await detector.detect(video);
        if (Array.isArray(barcodes) && barcodes.length) {
          value = String(barcodes[0]?.rawValue || '').trim();
        }
      }
      if (!value) {
        value = detectQrWithJsQr(video);
      }
      if (value) {
        await handleScannedValue(value);
      }
    }

    async function startScanner() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('Camera scanning is not supported on this device/browser.');
      }
      if (typeof BarcodeDetector === 'undefined' && typeof window.jsQR !== 'function') {
        throw new Error('QR scanning library is not available. Enter the code manually.');
      }
      stopScanner();
      scanHandled = false;
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' }
        },
        audio: false
      });
      activeScannerStream = stream;
      const video = $('scannerVideo');
      $('cameraField')?.classList.remove('is-hidden');
      video.srcObject = stream;
      video.classList.remove('is-hidden');
      await video.play();
      setStatus('Camera active. Point at a step-link QR code.');
      logLine('Camera scanner started.', {
        barcodeDetector: typeof BarcodeDetector !== 'undefined',
        jsQrFallback: typeof window.jsQR === 'function'
      });
      scanTimer = window.setInterval(() => {
        scanFrame().catch((err) => {
          logLine('Camera scan frame failed.', { message: err.message || String(err) });
        });
      }, 500);
    }

    function stopScanner() {
      if (scanTimer) {
        window.clearInterval(scanTimer);
        scanTimer = null;
      }
      if (activeScannerStream) {
        activeScannerStream.getTracks().forEach((track) => track.stop());
        activeScannerStream = null;
      }
      const video = $('scannerVideo');
      if (video) {
        video.pause();
        video.srcObject = null;
        video.classList.add('is-hidden');
      }
      $('cameraField')?.classList.add('is-hidden');
    }

    function bootstrap() {
      setLogVisibility(false);
      setPayloadVisibility(false);
      $('stepLinkCodeInput').value = urlCode;
      logLine('Start page bootstrapped.', {
        urlCode,
        urlSessionId,
        initialSessionId: getInitialSessionId()
      });

      $('resolveBtn').addEventListener('click', async () => {
        try {
          await submitStepLink('button');
        } catch (err) {
          logLine('Start step-link failed.', { message: err.message || String(err) });
          setStatus(err.message || String(err), 'error');
        }
      });
      $('stepLinkCodeInput').addEventListener('keydown', async (event) => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        try {
          await submitStepLink('enter');
        } catch (err) {
          logLine('Start step-link failed.', { message: err.message || String(err) });
          setStatus(err.message || String(err), 'error');
        }
      });
      $('startScanBtn').addEventListener('click', async () => {
        try {
          await startScanner();
        } catch (err) {
          logLine('Camera scanner failed to start.', { message: err.message || String(err) });
          setStatus(err.message || String(err), 'error');
        }
      });
      $('toggleLogBtn').addEventListener('click', () => {
        const shouldShow = $('logBox')?.classList.contains('is-hidden');
        setLogVisibility(Boolean(shouldShow));
      });
      $('togglePayloadBtn').addEventListener('click', () => {
        const shouldShow = $('payloadBox')?.classList.contains('is-hidden');
        setPayloadVisibility(Boolean(shouldShow));
      });
      $('clearLogBtn').addEventListener('click', () => {
        $('logBox').textContent = 'Log cleared.';
      });
      $('copyLogBtn').addEventListener('click', async () => {
        try {
          await copyText($('logBox').textContent || '');
          logLine('Log copied to clipboard.');
        } catch (err) {
          logLine('Copy log failed.', { message: err.message || String(err) });
        }
      });
      window.addEventListener('beforeunload', stopScanner);

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then((registration) => {
              logLine('Service worker registered.', { scope: registration.scope });
            })
            .catch((err) => {
              logLine('Service worker registration failed.', { message: err.message || String(err) });
            });
        });
      } else {
        logLine('Service worker is not supported in this browser.');
      }
    }

    bootstrap();
  </script>
</body>
</html>
