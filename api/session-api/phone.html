<!doctype html>
<html lang="nl">
<head>
  <!-- Favicons for browsers, Apple devices, Android, and installed web apps -->
  <link rel="icon" href="/braillestudio/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/braillestudio/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/braillestudio/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/braillestudio/apple-touch-icon.png">
  <link rel="manifest" href="/braillestudio/site.webmanifest">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BrailleStudio sessie starten</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --border: #d7dde8;
      --text: #172033;
      --muted: #5f6b7a;
      --blue: #206bc4;
      --green: #2fb344;
      --red: #d63939;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(560px, 100%);
      margin: 0 auto;
      padding: 24px 18px;
    }

    .brand {
      display: grid;
      justify-items: center;
      gap: 12px;
      margin: 0 0 22px;
    }

    .brand__logo {
      width: auto;
      height: 72px;
      object-fit: contain;
    }

    .brand__text {
      width: min(320px, 86vw);
      height: auto;
      max-height: 46px;
      object-fit: contain;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
      padding: 22px;
      text-align: center;
    }

    .scan-title {
      margin: 0;
      color: var(--text);
      font-size: 28px;
      line-height: 1.15;
    }

    .scan-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
    }

    button {
      width: 100%;
      min-height: 52px;
      margin-top: 18px;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--blue);
      color: #ffffff;
      font: inherit;
      font-weight: 700;
    }

    button.secondary {
      min-height: 44px;
      margin-top: 10px;
      background: #eef4ff;
      color: var(--blue);
      border: 1px solid #c7d7ff;
    }

    button:disabled {
      opacity: .65;
    }

    video {
      width: 100%;
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0f172a;
    }

    .status {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      color: var(--muted);
      background: #f8fafc;
    }

    .status.ok {
      color: #146c2e;
      border-color: #b7e2c1;
      background: #eefbf1;
    }

    .status.error {
      color: #8f2020;
      border-color: #f0b9b9;
      background: #fff1f1;
    }

    .manual-entry {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      text-align: left;
    }

    .manual-entry summary {
      cursor: pointer;
      text-align: center;
      font-weight: 700;
    }

    .manual-entry__body {
      margin-top: 8px;
    }

    code {
      word-break: break-word;
    }

    [hidden] {
      display: none !important;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.tastenbraille.com/braillestudio-data/opengraph/social-preview.png">
  <meta property="og:image:secure_url" content="https://www.tastenbraille.com/braillestudio-data/opengraph/social-preview.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1729">
  <meta property="og:image:height" content="910">
  <meta property="og:image:alt" content="BrailleStudio">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://www.tastenbraille.com/braillestudio-data/opengraph/social-preview.png">
  <meta name="twitter:image:alt" content="BrailleStudio">
</head>
<body>
  <main>
    <div class="brand" aria-label="BrailleStudio">
      <img class="brand__logo" src="../../style/logo.png" alt="">
      <img class="brand__text" src="../../style/braillestudio_banner_text.png" alt="BrailleStudio">
    </div>

    <section class="card">
      <h1 class="scan-title">Scan step-code</h1>
      <p class="scan-subtitle">Richt je camera op de QR-code.</p>

      <button id="scanBtn" type="button">Camera starten</button>

      <video id="video" playsinline muted hidden></video>
      <canvas id="canvas" hidden></canvas>

      <details class="manual-entry">
        <summary>Code typen</summary>
        <div class="manual-entry__body">
          <label for="codeInput">Code</label>
          <input id="codeInput" type="text" autocomplete="off" placeholder="Code">
          <button id="sendBtn" class="secondary" type="button">Verstuur code</button>
        </div>
      </details>

      <div id="status" class="status">Klaar om te scannen.</div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sessionCode = String(params.get('session') || params.get('session_code') || '').trim().toUpperCase();
    const SEND_STEP_LINK_URL = './send-step-link.php';
    const MARK_SESSION_OPEN_URL = './mark-session-open.php';
    const $ = (id) => document.getElementById(id);

    let stream = null;
    let scanTimer = null;
    let busy = false;

    function setStatus(message, kind = '') {
      const status = $('status');
      status.className = `status ${kind}`.trim();
      status.textContent = message;
    }

    function normalizeStepLinkCode(rawValue) {
      const value = String(rawValue || '').trim();
      if (!value) return '';
      try {
        const url = new URL(value);
        const fromQuery = String(url.searchParams.get('code') || url.searchParams.get('step_link') || '').trim();
        if (fromQuery) return fromQuery;
        const parts = url.pathname.split('/').filter(Boolean);
        return String(parts[parts.length - 1] || '').replace(/\.json$/i, '').trim();
      } catch {
        return value;
      }
    }

    async function sendStepLink(source = 'manual') {
      if (busy) return;
      const code = normalizeStepLinkCode($('codeInput').value);
      if (!sessionCode) {
        throw new Error('Geen sessie gevonden.');
      }
      if (!code) {
        throw new Error('Scan of typ de step-code.');
      }

      busy = true;
      $('sendBtn').disabled = true;
      $('codeInput').value = code;
      setStatus('Step starten...');
      try {
        const response = await fetch(SEND_STEP_LINK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_code: sessionCode,
            code
          })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          throw new Error(data.error || `HTTP ${response.status}`);
        }
        setStatus('Step gestart.', 'ok');
        console.log('[BrailleStudio phone] Step-link sent.', { source, data });
      } finally {
        busy = false;
        $('sendBtn').disabled = false;
      }
    }

    async function markSessionOpen() {
      if (!sessionCode) return;
      const response = await fetch(MARK_SESSION_OPEN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_code: sessionCode })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }
      setStatus('Scan de step-code.');
    }

    function detectQrWithJsQr(video) {
      const canvas = $('canvas');
      if (!canvas || !video?.videoWidth || !video?.videoHeight || typeof window.jsQR !== 'function') {
        return '';
      }
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const context = canvas.getContext('2d', { willReadFrequently: true });
      if (!context) return '';
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
      const result = window.jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });
      return String(result?.data || '').trim();
    }

    async function scanFrame() {
      const video = $('video');
      if (!video || video.readyState < 2 || busy) return;
      let value = '';
      if (typeof BarcodeDetector !== 'undefined') {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const barcodes = await detector.detect(video);
        if (Array.isArray(barcodes) && barcodes.length) {
          value = String(barcodes[0]?.rawValue || '').trim();
        }
      }
      if (!value) {
        value = detectQrWithJsQr(video);
      }
      if (!value) return;
      const code = normalizeStepLinkCode(value);
      if (!code) return;
      $('codeInput').value = code;
      stopScanner();
      await sendStepLink('scanner');
    }

    async function startScanner() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error('Camera niet beschikbaar.');
      }
      if (typeof BarcodeDetector === 'undefined' && typeof window.jsQR !== 'function') {
        throw new Error('QR-scannen lukt niet. Typ de code.');
      }
      stopScanner();
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });
      const video = $('video');
      video.srcObject = stream;
      video.hidden = false;
      await video.play();
      $('scanBtn').textContent = 'Stop camera';
      setStatus('Richt op de QR-code.');
      scanTimer = window.setInterval(() => {
        scanFrame().catch((err) => setStatus(err.message || String(err), 'error'));
      }, 500);
    }

    function stopScanner() {
      if (scanTimer) {
        window.clearInterval(scanTimer);
        scanTimer = null;
      }
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      const video = $('video');
      video.pause();
      video.srcObject = null;
      video.hidden = true;
      $('scanBtn').textContent = 'Camera starten';
    }

    function bootstrap() {
      if (!sessionCode) {
        setStatus('Geen sessie gevonden.', 'error');
      } else {
        markSessionOpen().catch((err) => setStatus(err.message || String(err), 'error'));
      }

      $('sendBtn').addEventListener('click', () => {
        sendStepLink('button').catch((err) => setStatus(err.message || String(err), 'error'));
      });
      $('codeInput').addEventListener('keydown', (event) => {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        sendStepLink('enter').catch((err) => setStatus(err.message || String(err), 'error'));
      });
      $('scanBtn').addEventListener('click', () => {
        if (stream) {
          stopScanner();
          setStatus('Camera gestopt.');
          return;
        }
        startScanner().catch((err) => setStatus(err.message || String(err), 'error'));
      });
      window.addEventListener('beforeunload', stopScanner);
    }

    bootstrap();
  </script>
</body>
</html>
