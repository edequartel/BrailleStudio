<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ElevenLabs MP3 From Text</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15, 23, 42, 0.10);
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font: 14px/1.5 "Noto Sans", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 520px at 10% 10%, rgba(37, 99, 235, 0.12), transparent 58%),
        radial-gradient(760px 460px at 92% 8%, rgba(14, 165, 233, 0.10), transparent 55%),
        var(--bg);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .hero {
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 760px;
    }

    .card {
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    select,
    textarea,
    input,
    button {
      font: inherit;
    }

    select,
    textarea,
    input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(180deg, var(--blue), var(--blue-dark));
      color: #eff6ff;
    }

    .secondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .status {
      margin-top: 16px;
      color: var(--muted);
      min-height: 22px;
    }

    audio {
      width: 100%;
      margin-top: 16px;
    }

    .small {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta-line {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .error-log {
      margin-top: 16px;
      border: 1px solid rgba(220, 38, 38, 0.16);
      background: rgba(254, 242, 242, 0.92);
      color: #991b1b;
      border-radius: 18px;
      padding: 14px 16px;
    }

    .error-log[hidden] {
      display: none;
    }

    .error-log h2 {
      margin: 0 0 10px;
      font-size: 14px;
    }

    .error-log-list {
      margin: 0;
      padding-left: 18px;
      max-height: 180px;
      overflow: auto;
    }

    .error-log-list li + li {
      margin-top: 6px;
    }

    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .preset-btn {
      background: rgba(37, 99, 235, 0.08);
      color: var(--blue-dark);
      border: 1px solid rgba(37, 99, 235, 0.15);
      padding: 10px 14px;
    }

    .preset-btn.active {
      background: linear-gradient(180deg, var(--blue), var(--blue-dark));
      color: #eff6ff;
      border-color: transparent;
    }

    code {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.06);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>ElevenLabs MP3 from Text</h1>
      <p>Deze pagina gebruikt server-side PHP endpoints. De ElevenLabs API key blijft op de server en hoeft niet in de browser zichtbaar te zijn.</p>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="voiceSelect">Voice</label>
          <select id="voiceSelect">
            <option value="">Loading voices…</option>
          </select>
          <div id="presetButtons" class="preset-row"></div>
        </div>
        <div>
          <label for="modelInput">Model</label>
          <input id="modelInput" value="eleven_multilingual_v2">
        </div>
      </div>

      <div style="margin-top: 16px;">
        <label for="textInput">Text</label>
        <textarea id="textInput" placeholder="Type text here…"></textarea>
      </div>

      <div class="actions">
        <button id="generateBtn" class="primary" type="button">Generate MP3</button>
        <button id="downloadBtn" class="secondary" type="button" disabled>Download MP3</button>
      </div>

      <div id="statusBox" class="status"></div>
      <audio id="audioPlayer" controls></audio>

      <div id="errorLog" class="error-log" hidden>
        <h2>Error log</h2>
        <ol id="errorLogList" class="error-log-list"></ol>
      </div>

      <div class="small">
        Endpoints: <code>./voices.php</code> and <code>./tts.php</code>
      </div>
      <div id="apiBaseInfo" class="meta-line"></div>
    </div>
  </div>

  <script>
    const voiceSelect = document.getElementById('voiceSelect');
    const modelInput = document.getElementById('modelInput');
    const textInput = document.getElementById('textInput');
    const generateBtn = document.getElementById('generateBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusBox = document.getElementById('statusBox');
    const audioPlayer = document.getElementById('audioPlayer');
    const presetButtons = document.getElementById('presetButtons');
    const errorLog = document.getElementById('errorLog');
    const errorLogList = document.getElementById('errorLogList');
    const apiBaseInfo = document.getElementById('apiBaseInfo');

    let currentAudioUrl = '';
    let configuredVoices = [];
    let defaultVoiceId = '';
    const LOCAL_API_BASE = 'https://www.tastenbraille.com/braillestudio/api/elevenlabs-api/';

    function setStatus(message) {
      statusBox.textContent = String(message || '');
    }

    function apiBaseUrl() {
      const host = String(window.location.hostname || '').toLowerCase();
      if (host === '127.0.0.1' || host === 'localhost') {
        return LOCAL_API_BASE;
      }
      return window.location.href;
    }

    function endpointUrl(fileName) {
      return new URL(fileName, apiBaseUrl()).toString();
    }

    function renderApiBaseInfo() {
      apiBaseInfo.textContent = `API base: ${apiBaseUrl()}`;
    }

    function appendErrorLog(source, error) {
      const item = document.createElement('li');
      const timestamp = new Date().toLocaleTimeString();
      const details = error instanceof Error
        ? (error.stack || error.message || String(error))
        : String(error || 'Unknown error');
      item.textContent = `[${timestamp}] ${source}: ${details}`;
      errorLogList.prepend(item);
      while (errorLogList.children.length > 12) {
        errorLogList.removeChild(errorLogList.lastChild);
      }
      errorLog.hidden = false;
      console.error(`[ElevenLabs] ${source}`, error);
    }

    function renderPresetButtons() {
      presetButtons.innerHTML = '';
      if (!configuredVoices.length) {
        return;
      }

      for (const voice of configuredVoices) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'preset-btn';
        button.dataset.voiceId = voice.voice_id || '';
        button.textContent = voice.language
          ? `${voice.name} (${voice.language})`
          : (voice.name || voice.voice_id || 'Voice');
        button.addEventListener('click', () => {
          voiceSelect.value = voice.voice_id || '';
          syncPresetState();
        });
        presetButtons.appendChild(button);
      }

      syncPresetState();
    }

    function syncPresetState() {
      for (const button of presetButtons.querySelectorAll('.preset-btn')) {
        button.classList.toggle('active', button.dataset.voiceId === voiceSelect.value);
      }
    }

    function revokeCurrentAudioUrl() {
      if (currentAudioUrl) {
        URL.revokeObjectURL(currentAudioUrl);
        currentAudioUrl = '';
      }
    }

    async function loadVoices() {
      setStatus('Loading voices…');
      const voicesUrl = endpointUrl('voices.php');
      const res = await fetch(voicesUrl, { cache: 'no-store' });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }

      configuredVoices = Array.isArray(data.configured_voices) ? data.configured_voices : [];
      defaultVoiceId = String(data.default_voice_id || '').trim();
      voiceSelect.innerHTML = '';
      for (const voice of data.voices || []) {
        const option = document.createElement('option');
        option.value = voice.voice_id || '';
        option.textContent = voice.name
          ? `${voice.name}${voice.category ? ` (${voice.category})` : ''}`
          : (voice.voice_id || 'Unnamed voice');
        voiceSelect.appendChild(option);
      }

      if (defaultVoiceId) {
        voiceSelect.value = defaultVoiceId;
      }
      if (!voiceSelect.value && voiceSelect.options.length > 0) {
        voiceSelect.selectedIndex = 0;
      }
      renderPresetButtons();
      setStatus(`Loaded ${voiceSelect.options.length} voices.`);
    }

    async function generateMp3() {
      const voiceId = String(voiceSelect.value || '').trim();
      const modelId = String(modelInput.value || '').trim();
      const text = String(textInput.value || '').trim();

      if (!voiceId) {
        setStatus('Select a voice first.');
        return;
      }
      if (!text) {
        setStatus('Enter text first.');
        return;
      }

      generateBtn.disabled = true;
      downloadBtn.disabled = true;
      setStatus('Generating MP3…');

      try {
        const ttsUrl = endpointUrl('tts.php');
        const res = await fetch(ttsUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            voice_id: voiceId,
            model_id: modelId || 'eleven_multilingual_v2',
            text
          })
        });

        if (!res.ok || (res.headers.get('content-type') || '').includes('application/json')) {
          const errorBody = await res.json().catch(() => ({}));
          throw new Error(errorBody.error || `HTTP ${res.status}`);
        }

        const blob = await res.blob();
        revokeCurrentAudioUrl();
        currentAudioUrl = URL.createObjectURL(blob);
        audioPlayer.src = currentAudioUrl;
        audioPlayer.play().catch(() => {});
        downloadBtn.disabled = false;
        setStatus('MP3 ready.');
      } catch (error) {
        appendErrorLog('generateMp3', error);
        setStatus(`Error: ${error.message || String(error)}`);
      } finally {
        generateBtn.disabled = false;
      }
    }

    generateBtn.addEventListener('click', generateMp3);
    voiceSelect.addEventListener('change', syncPresetState);
    downloadBtn.addEventListener('click', () => {
      if (!currentAudioUrl) return;
      const a = document.createElement('a');
      a.href = currentAudioUrl;
      a.download = 'elevenlabs.mp3';
      document.body.appendChild(a);
      a.click();
      a.remove();
    });

    loadVoices().catch((error) => {
      appendErrorLog('loadVoices', `${error.message || String(error)} | page=${window.location.href}`);
      setStatus(`Error loading voices: ${error.message || String(error)}`);
      voiceSelect.innerHTML = '<option value="">Could not load voices</option>';
    });

    renderApiBaseInfo();

    window.addEventListener('error', (event) => {
      appendErrorLog('window.error', event.error || event.message || 'Unknown script error');
    });

    window.addEventListener('unhandledrejection', (event) => {
      appendErrorLog('unhandledrejection', event.reason || 'Unhandled promise rejection');
    });
  </script>
</body>
</html>
