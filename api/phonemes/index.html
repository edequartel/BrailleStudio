<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Inspector</title>
  <style>
    @font-face {
      font-family: "Noto Sans";
      src: url("../fonts/NotoSans-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Noto Sans";
      src: url("../fonts/NotoSans-SemiBold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #0b1220;
      --fg: #e5e7eb;
      --panel: #0f172a;
      --panel2: #101b27;
      --muted: #94a3b8;
      --label: #cbd5e1;
      --code-bg: #111827;
      --border: rgba(255,255,255,.10);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: "Noto Sans", Arial, sans-serif;
      --shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--sans);
      background:
        radial-gradient(1200px 800px at 15% 10%, rgba(106,166,255,.10), transparent 60%),
        radial-gradient(900px 650px at 90% 25%, rgba(126,231,135,.10), transparent 55%),
        var(--bg);
      color: var(--fg);
      line-height: 1.4;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: color-mix(in oklab, var(--bg) 80%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .wrap {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: .2px;
    }

    .title .sub {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
    }

    main .wrap {
      padding-top: 16px;
      padding-bottom: 24px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 12px 20px;
    }
    @media (max-width: 820px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--label);
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: color-mix(in oklab, var(--panel) 92%, black 8%);
      color: var(--fg);
      font: inherit;
    }
    .row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, color-mix(in oklab, var(--panel) 92%, white 8%), var(--panel));
      color: var(--fg);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: var(--shadow);
      font-size: 13px;
      font-family: var(--sans);
      line-height: 1;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      transition: transform .06s ease, border-color .15s ease;
    }
    button:active { transform: translateY(1px); }
    pre {
      background: var(--code-bg);
      padding: 12px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--fg);
      font-family: var(--mono);
    }
    .small {
      color: var(--muted);
      font-size: 0.95em;
    }
    .card {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      box-shadow: var(--shadow);
      padding: 18px;
      margin-top: 16px;
      border-radius: var(--radius);
      overflow: hidden;
    }
    ul {
      padding-left: 20px;
      margin: 0;
    }
    a {
      color: #60a5fa;
    }
    code {
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 6px;
      font-family: var(--mono);
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <div class="topbar">
        <div class="title">
          <h1>API Inspector</h1>
          <div class="sub">list.php tester</div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <p class="small">
        Deze pagina bouwt een request voor:
        <code id="baseUrlHint">https://tastenbraille.com/api/list.php</code>
      </p>

      <div class="card">
        <h2>Other APIs</h2>
        <ul>
          <li><a href="./elevenlabs-api/index.html">ElevenLabs MP3 from Text</a></li>
        </ul>
      </div>

      <div class="card">
        <div class="grid">
      <div>
        <label for="baseUrl">API endpoint</label>
        <input id="baseUrl" value="https://tastenbraille.com/api/list.php" placeholder="https://tastenbraille.com/api/list.php" />
      </div>

      <div>
        <label for="folder">folder</label>
        <select id="folder">
          <option value="speech">speech</option>
          <option value="letters">letters</option>
          <option value="instructions">instructions</option>
          <option value="feedback">feedback</option>
          <option value="story">story</option>
          <option value="general">general</option>
        </select>
      </div>

      <div>
        <label for="letters">letters</label>
        <input id="letters" placeholder="a,b,k,l" />
      </div>

      <div>
        <label for="klanken">klanken</label>
        <input id="klanken" placeholder="a,e,i,ou,ei" />
      </div>

      <div>
        <label for="onlyletters">onlyletters</label>
        <input id="onlyletters" placeholder="a,l,p,m" />
      </div>

      <div>
        <label for="onlyklanken">onlyklanken</label>
        <input id="onlyklanken" placeholder="a,aa,ei,ou,l,m,p" />
      </div>

      <div>
        <label for="onlycombo">onlycombo</label>
        <select id="onlycombo">
          <option value="">(leeg)</option>
          <option value="true">true</option>
          <option value="false">false</option>
        </select>
      </div>

      <div>
        <label for="maxlength">maxlength</label>
        <input id="maxlength" type="number" min="0" placeholder="4" />
      </div>

      <div>
        <label for="length">length</label>
        <input id="length" type="number" min="0" placeholder="3" />
      </div>

      <div>
        <label for="limit">limit</label>
        <input id="limit" type="number" min="0" placeholder="10" />
      </div>

      <div>
        <label for="randomlimit">randomlimit</label>
        <input id="randomlimit" type="number" min="0" placeholder="10" />
      </div>

      <div>
        <label for="sort">sort</label>
        <select id="sort">
          <option value="">(leeg)</option>
          <option value="asc">asc</option>
          <option value="desc">desc</option>
          <option value="random">random</option>
        </select>
      </div>
        </div>

        <div class="row">
          <button id="buildBtn">Bouw URL</button>
          <button id="testBtn">Test API</button>
          <button id="exampleBtn">Voorbeeld invullen</button>
          <button id="clearBtn">Leegmaken</button>
        </div>
      </div>

      <div class="card">
        <h2>Request URL</h2>
        <pre id="urlBox"></pre>
      </div>

      <div class="card">
        <h2>Response</h2>
        <pre id="responseBox">Nog niets opgehaald.</pre>
      </div>

      <div class="card">
        <h2>Audio items</h2>
        <ul id="listBox"></ul>
      </div>

    </div>
  </main>

  <script>
    const fields = [
      'folder', 'letters', 'klanken', 'onlyletters', 'onlyklanken',
      'onlycombo', 'maxlength', 'length', 'limit', 'randomlimit', 'sort'
    ];

    function getBaseUrl() {
      const value = document.getElementById('baseUrl').value.trim();
      return value || 'https://tastenbraille.com/api/list.php';
    }

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function buildUrl() {
      const baseUrl = getBaseUrl();
      const urlObj = new URL(baseUrl, window.location.href);
      const params = new URLSearchParams(urlObj.search);

      for (const field of fields) {
        const value = getValue(field);
        if (value !== '') {
          params.set(field, value);
        }
      }

      urlObj.search = params.toString();
      return urlObj.toString();
    }

    function canUseProxy(url) {
      try {
        const u = new URL(url);
        return u.protocol === 'https:' && u.host === 'tastenbraille.com';
      } catch {
        return false;
      }
    }

    async function fetchViaProxy(url) {
      const proxyUrl = `fetch-remote.php?url=${encodeURIComponent(url)}`;
      return fetch(proxyUrl);
    }

    function looksLikePhpSource(text) {
      const src = String(text || '').trim();
      return src.startsWith('<?php') || src.includes('declare(strict_types=1);');
    }

    async function parseJsonResponse(res, usedProxy) {
      if (!res.ok) {
        const errorText = await res.text();
        return {
          ok: false,
          message:
            `HTTP ${res.status} ${res.statusText}\n\n` +
            (errorText || '(lege response body)')
        };
      }

      const contentType = (res.headers.get('content-type') || '').toLowerCase();
      const text = await res.text();

      if (usedProxy && looksLikePhpSource(text)) {
        return {
          ok: false,
          message:
            'De proxy retourneert PHP broncode in plaats van uitgevoerde JSON.\n\n' +
            'Deze pagina draait waarschijnlijk op een statische server zonder PHP.\n' +
            'Gebruik direct https://tastenbraille.com/api/list.php of start een PHP-webserver voor /api/.'
        };
      }

      if (!contentType.includes('application/json') && (text.includes('<!DOCTYPE html') || text.includes('<html'))) {
        return {
          ok: false,
          message:
            'HTML ontvangen in plaats van JSON.\n\n' +
            'Controleer of het endpoint klopt en of de server PHP uitvoert.'
        };
      }

      try {
        return { ok: true, data: JSON.parse(text) };
      } catch {
        return {
          ok: false,
          message: `Geen geldige JSON ontvangen:\n\n${text}`
        };
      }
    }

    function showUrl() {
      document.getElementById('baseUrlHint').textContent = getBaseUrl();
      document.getElementById('urlBox').textContent = buildUrl();
    }

    async function testApi() {
      const url = buildUrl();
      showUrl();

      const responseBox = document.getElementById('responseBox');
      const listBox = document.getElementById('listBox');
      responseBox.textContent = 'Bezig met ophalen...';
      listBox.innerHTML = '';

      try {
        let usedProxy = false;
        let parsed;

        try {
          const directRes = await fetch(url);
          parsed = await parseJsonResponse(directRes, false);
        } catch (directErr) {
          if (!canUseProxy(url)) {
            throw directErr;
          }
          const proxyRes = await fetchViaProxy(url);
          usedProxy = true;
          parsed = await parseJsonResponse(proxyRes, true);
        }

        if (!parsed.ok) {
          responseBox.textContent = parsed.message;
          return;
        }

        const data = parsed.data;

        responseBox.textContent = `${usedProxy ? '(via proxy)\n\n' : ''}${JSON.stringify(data, null, 2)}`;

        if (Array.isArray(data)) {
          for (const item of data) {
            const li = document.createElement('li');
            const word = item.word ?? '(geen word)';
            const url = item.url ?? '';
            li.innerHTML = `<strong>${escapeHtml(word)}</strong>${url ? ` -- <a href="${encodeURI(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>` : ''}`;
            listBox.appendChild(li);
          }
        }
      } catch (err) {
        responseBox.textContent =
          `Fout bij ophalen:\n\n${err}\n\n` +
          'Mogelijke oorzaak: CORS/netwerk of je draait deze pagina via file://.\n' +
          'Gebruik bij voorkeur een lokale webserver (http://localhost/...) en endpoint "list.php".\n' +
          'Voor https://tastenbraille.com wordt automatisch fallback naar fetch-remote.php geprobeerd.';
      }
    }

    function fillExample() {
      document.getElementById('folder').value = 'speech';
      document.getElementById('baseUrl').value = 'https://tastenbraille.com/api/list.php';
      document.getElementById('letters').value = 'a,b,k,l';
      document.getElementById('klanken').value = 'a,e,i,ou,ei';
      document.getElementById('onlyletters').value = '';
      document.getElementById('onlyklanken').value = '';
      document.getElementById('onlycombo').value = '';
      document.getElementById('maxlength').value = '4';
      document.getElementById('length').value = '';
      document.getElementById('limit').value = '10';
      document.getElementById('randomlimit').value = '';
      document.getElementById('sort').value = 'asc';
      showUrl();
    }

    function clearForm() {
      document.getElementById('folder').value = 'speech';
      document.getElementById('baseUrl').value = 'https://tastenbraille.com/api/list.php';
      for (const field of fields) {
        if (field !== 'folder') document.getElementById(field).value = '';
      }
      document.getElementById('urlBox').textContent = '';
      document.getElementById('responseBox').textContent = 'Nog niets opgehaald.';
      document.getElementById('listBox').innerHTML = '';
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    document.getElementById('buildBtn').addEventListener('click', showUrl);
    document.getElementById('testBtn').addEventListener('click', testApi);
    document.getElementById('exampleBtn').addEventListener('click', fillExample);
    document.getElementById('clearBtn').addEventListener('click', clearForm);
    document.getElementById('baseUrl').addEventListener('input', showUrl);

    showUrl();
  </script>
</body>
</html>
