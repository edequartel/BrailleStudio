<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Injected Data Voorbeeld</title>

  <style>
    :root {
      --bg: #0b1220;
      --fg: #e5e7eb;
      --panel: #0f172a;
      --panel2: #101b27;
      --muted: #94a3b8;
      --code-bg: #111827;
      --border: rgba(255,255,255,.10);
      --radius: 14px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: "Noto Sans", Arial, sans-serif;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.14);
      --shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
      color-scheme: dark;
    }

    @font-face {
      font-family: "Noto Sans";
      src: url("../fonts/NotoSans-Regular.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Noto Sans";
      src: url("../fonts/NotoSans-SemiBold.woff2") format("woff2");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--fg);
      background:
        radial-gradient(1200px 800px at 15% 10%, rgba(106,166,255,.10), transparent 60%),
        radial-gradient(900px 650px at 90% 25%, rgba(126,231,135,.10), transparent 55%),
        var(--bg);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: color-mix(in oklab, var(--bg) 80%, transparent);
      border-bottom: 1px solid var(--border);
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .topbar {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .title h1 {
      font-size: 18px;
      margin: 0;
      letter-spacing: .2px;
    }

    .title .sub {
      font-size: 13px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .hero,
    .panel {
      background: linear-gradient(180deg, var(--panel), var(--panel2));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero h1 {
      margin: 14px 0 10px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .panel {
      padding: 18px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--panel) 88%, black 12%);
      color: var(--fg);
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
      line-height: 1;
    }

    .btn:hover {
      background: color-mix(in oklab, var(--panel) 84%, black 16%);
    }

    .btn-primary {
      background: color-mix(in oklab, var(--accent) 28%, var(--panel) 72%);
      border-color: rgba(96,165,250,.35);
    }

    .index-input {
      width: 90px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: color-mix(in oklab, var(--panel) 92%, black 8%);
      color: var(--fg);
      font: inherit;
    }

    .file-input {
      display: none;
    }

    code,
    pre {
      font-family: var(--mono);
    }

    code {
      font-size: 0.95em;
      background: var(--code-bg);
      border-radius: 6px;
      padding: 2px 6px;
    }

    pre {
      margin: 0;
      padding: 16px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in oklab, var(--panel) 94%, black 6%);
      color: var(--fg);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      min-height: 140px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .current-word {
      margin: 0 0 14px;
      color: var(--accent);
      font-weight: 600;
      font-size: 15px;
    }

    .script-path {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      word-break: break-all;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="page" style="padding-top: 18px; padding-bottom: 18px;">
      <div class="topbar">
        <div class="title">
          <h1>Injected Data Voorbeeld</h1>
          <div class="sub">External Lesson Data + Blockly Demo</div>
        </div>
      </div>
    </div>
  </header>

  <div class="page">
    <section class="grid">
      <section class="panel">
        <h2>Blockly Runner</h2>
        <p id="currentWordLabel" class="current-word">Current word: -</p>
        <p id="scriptPathLabel" class="script-path">Script: -</p>
        <div class="actions">
          <input id="recordIndexInput" class="index-input" type="number" min="0" step="1" value="0" aria-label="Record index">
          <button id="selectBlocklyFileBtn" class="btn" type="button">Select Blockly File</button>
          <button id="runExampleBtn" class="btn btn-primary" type="button">Run Example</button>
          <button id="playCurrentWordBtn" class="btn" type="button">Play Current Word</button>
        </div>
        <input id="blocklyFileInput" class="file-input" type="file" accept=".blockly,application/xml,text/xml">
        <p class="small">This page loads a Blockly file, injects the requested record from <code>./aanvankelijklijst.json</code>, and runs it headlessly without showing the Blockly canvas.</p>
      </section>

      <div class="stack">
        <section class="panel">
          <h2>Run Log</h2>
          <pre id="runLogBox"></pre>
        </section>
      </div>
    </section>
  </div>
  <iframe
    id="blocklyRuntimeFrame"
    src="../blockly/index.html?headless=1"
    title="Hidden Blockly Runtime"
    style="position:absolute; left:-200vw; top:0; width:1400px; height:900px; border:0; opacity:0; pointer-events:none;"
  ></iframe>

  <script>
    const EXTERNAL_DATA_URL = "./aanvankelijklijst.json";
    const DEFAULT_BLOCKLY_SCRIPT = "../blockly/scripts/injection.blockly";
    let externalLessonData = [];
    let selectedBlocklySource = null;
    const searchParams = new URLSearchParams(window.location.search);
    let blocklyApp = null;

    function getRequestedScriptPath() {
      return String(searchParams.get("script") || searchParams.get("file") || DEFAULT_BLOCKLY_SCRIPT).trim();
    }

    function shouldAutoRun() {
      const raw = String(searchParams.get("autorun") || "").trim().toLowerCase();
      if (!raw) return true;
      return !["0", "false", "no", "off"].includes(raw);
    }

    function getRequestedRecordIndex() {
      const input = document.getElementById("recordIndexInput");
      return Math.max(0, Math.floor(Number(input?.value) || 0));
    }

    function applyInitialQueryState() {
      const requestedIndex = Math.max(0, Math.floor(Number(searchParams.get("index")) || 0));
      const input = document.getElementById("recordIndexInput");
      if (input) input.value = String(requestedIndex);
      renderScriptPathLabel();
    }

    function renderScriptPathLabel() {
      const scriptPathLabel = document.getElementById("scriptPathLabel");
      if (!scriptPathLabel) return;
      const label = selectedBlocklySource?.label || getRequestedScriptPath();
      scriptPathLabel.textContent = `Script: ${label}`;
    }

    async function loadExternalLessonData() {
      const response = await fetch(EXTERNAL_DATA_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      externalLessonData = Array.isArray(data) ? data : [];
      return externalLessonData;
    }

    async function injectExternalData(index = 0) {
      if (!Array.isArray(externalLessonData) || externalLessonData.length === 0) {
        await loadExternalLessonData();
      }
      window.aanvankelijkData = structuredClone(externalLessonData);
      setActiveLessonRecordByIndex(index);
      renderInjectedData();
    }

    function formatValue(value) {
      if (typeof value === "string") return value;
      if (value == null) return "";
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    function renderInjectedData() {
      const currentWordLabel = document.getElementById("currentWordLabel");
      const currentWord = String(window.currentRecord?.word ?? "");
      if (currentWordLabel) {
        currentWordLabel.textContent = currentWord ? `Current word: ${currentWord}` : "Current word: -";
      }
    }

    function setActiveLessonRecordByIndex(index) {
      const list = Array.isArray(window.aanvankelijkData) ? window.aanvankelijkData : [];
      const normalizedIndex = Math.floor(Number(index) || 0);
      const record = normalizedIndex >= 0 && normalizedIndex < list.length ? list[normalizedIndex] : null;
      window.currentRecord = record;
      window.currentRecordIndex = record ? normalizedIndex : -1;
      renderInjectedData();
      return record;
    }

    function getLessonFieldValue(record, field) {
      const key = String(field || "");
      if (!record || typeof record !== "object") {
        if (key === "word") return "";
        if (key === "categories" || key === "newSoundCategories" || key === "knownSoundCategories") return {};
        return [];
      }
      const value = record[key];
      if (value != null) return value;
      if (key === "word") return "";
      if (key === "categories" || key === "newSoundCategories" || key === "knownSoundCategories") return {};
      return [];
    }

    function getLessonCategoryArray(record, source, category) {
      const sourceKey = String(source || "categories");
      const categoryKey = String(category || "");
      if (!record || typeof record !== "object" || !categoryKey) return [];
      const root = record[sourceKey];
      if (!root || typeof root !== "object") return [];
      return Array.isArray(root[categoryKey]) ? root[categoryKey] : [];
    }

    function resolveSpeechUrl(file) {
      const value = String(file ?? "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      const normalized = value.toLowerCase().endsWith(".mp3") ? value : `${value}.mp3`;
      return `https://www.tastenbraille.com/braillestudio/sounds/nl/speech/${encodeURIComponent(normalized)}`;
    }

    function resolveStoryUrl(file) {
      const value = String(file ?? "").trim();
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      const normalized = value.toLowerCase().endsWith(".mp3") ? value : `${value}.mp3`;
      return `https://www.tastenbraille.com/braillestudio/sounds/nl/stories/${encodeURIComponent(normalized)}`;
    }

    async function playSpeechFile(file) {
      const url = resolveSpeechUrl(file);
      if (!url) return;
      logValue("speech url", url);
      const audio = new Audio(url);
      await audio.play();
    }

    async function playStoryFile(file) {
      const url = resolveStoryUrl(file);
      if (!url) return;
      logValue("story url", url);
      const audio = new Audio(url);
      await audio.play();
    }

    async function playUrl(url) {
      const target = String(url ?? "").trim();
      if (!target) return;
      logValue("audio url", target);
      const audio = new Audio(target);
      await new Promise((resolve, reject) => {
        audio.onended = resolve;
        audio.onerror = () => reject(new Error("Audio playback failed"));
        audio.play().catch(reject);
      });
    }

    async function playCurrentWord() {
      const word = String(window.currentRecord?.word ?? "").trim();
      if (!word) {
        logValue("play", "no active word");
        return;
      }
      await playSpeechFile(word);
    }

    function logValue(label, value) {
      const box = document.getElementById("runLogBox");
      box.textContent += `${label}: ${formatValue(value)}\n`;
    }

    function logStage(message) {
      const box = document.getElementById("runLogBox");
      box.textContent += `[runner] ${String(message ?? "")}\n`;
    }

    function clearLogBox() {
      const box = document.getElementById("runLogBox");
      box.textContent = "";
    }

    function appendRuntimeLog(line) {
      const box = document.getElementById("runLogBox");
      box.textContent += `${line}\n`;
    }

    async function ensureBlocklyApp() {
      if (blocklyApp) return blocklyApp;
      const frame = document.getElementById("blocklyRuntimeFrame");
      logStage("Waiting for hidden Blockly runtime iframe");
      const start = Date.now();
      let lastStage = "";
      let lastReadyState = "";
      let lastError = "";

      while (Date.now() - start < 10000) {
        const app = frame.contentWindow && frame.contentWindow.BrailleBlocklyApp;
        if (app) {
          app.setLogHandler(appendRuntimeLog);
          app.setPlayHandler(playUrl);
          logStage("Hidden Blockly runtime API is ready");
          blocklyApp = app;
          return app;
        }

        const boot = frame.contentWindow?.BrailleBlocklyBoot || null;
        const readyState = frame.contentDocument?.readyState || "(unavailable)";
        const stage = boot?.stage || "(unknown)";
        const error = boot?.error || "";

        if (stage !== lastStage || readyState !== lastReadyState || error !== lastError) {
          logStage(`Runtime state: readyState=${readyState}, stage=${stage}${error ? `, error=${error}` : ""}`);
          lastStage = stage;
          lastReadyState = readyState;
          lastError = error;
        }

        if (stage === "error") {
          throw new Error(`Blockly runtime failed during boot${error ? `: ${error}` : ""}`);
        }

        await new Promise((resolve) => setTimeout(resolve, 100));
      }

      const app = frame.contentWindow && frame.contentWindow.BrailleBlocklyApp;
      if (!app) throw new Error("Blockly runtime API is not available");
      return app;
    }

    async function getSelectedBlocklyText(scriptPath = getRequestedScriptPath()) {
      if (selectedBlocklySource?.text) {
        logStage(`Using selected local Blockly file: ${selectedBlocklySource.label}`);
        return selectedBlocklySource.text;
      }
      logStage(`Fetching Blockly file: ${scriptPath}`);
      const response = await fetch(scriptPath, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      logStage(`Fetched Blockly file successfully: ${scriptPath}`);
      return text;
    }

    async function loadExampleScript(scriptPath = getRequestedScriptPath()) {
      const app = await ensureBlocklyApp();
      const text = await getSelectedBlocklyText(scriptPath);
      const sourceName = selectedBlocklySource?.label || scriptPath;
      logStage(`Loading Blockly workspace: ${sourceName}`);
      app.loadWorkspaceFromText(text, sourceName);
      logStage(`Blockly workspace loaded: ${sourceName}`);
    }

    async function handleSelectedBlocklyFile(file) {
      if (!file) return;
      const text = await file.text();
      selectedBlocklySource = {
        label: file.name,
        text
      };
      renderScriptPathLabel();
      await loadExampleScript();
      document.getElementById("runLogBox").textContent = `Loaded local Blockly file: ${file.name}\n`;
    }

    async function syncInjectedData() {
      const app = await ensureBlocklyApp();
      logStage(`Injecting lesson data from ./aanvankelijklijst.json with index ${getRequestedRecordIndex()}`);
      await app.injectLessonData(externalLessonData, getRequestedRecordIndex());
      const currentRecord = app.getCurrentRecord();
      window.currentRecord = currentRecord;
      renderInjectedData();
      logStage(`Injected current record: ${currentRecord?.word ?? "(none)"}`);
      return currentRecord;
    }

    async function runExample() {
      clearLogBox();
      logStage("Run Example clicked");
      const app = await ensureBlocklyApp();
      const text = await getSelectedBlocklyText();
      const sourceName = selectedBlocklySource?.label || getRequestedScriptPath();
      logStage(`Starting headless run for: ${sourceName}`);
      const result = await app.runWorkspaceTextHeadless({
        text,
        sourceName,
        lessonData: externalLessonData,
        index: getRequestedRecordIndex(),
        onLog: appendRuntimeLog
      });
      window.currentRecord = result?.currentRecord || app.getCurrentRecord();
      renderInjectedData();
      logStage(`Headless run finished. Active record: ${window.currentRecord?.word ?? "(none)"}`);
    }

    async function openBlocklyFilePicker() {
      if (typeof window.showOpenFilePicker === "function") {
        try {
          const [handle] = await window.showOpenFilePicker({
            multiple: false,
            types: [
              {
                description: "Blockly Files",
                accept: {
                  "application/octet-stream": [".blockly"],
                  "application/xml": [".blockly", ".xml"],
                  "text/xml": [".blockly", ".xml"]
                }
              }
            ]
          });
          if (!handle) return;
          const file = await handle.getFile();
          await handleSelectedBlocklyFile(file);
          return;
        } catch (error) {
          if (error && error.name === "AbortError") return;
        }
      }

      document.getElementById("blocklyFileInput").click();
    }

    document.getElementById("recordIndexInput").addEventListener("input", () => {
      const index = getRequestedRecordIndex();
      if (!Array.isArray(window.aanvankelijkData) || window.aanvankelijkData.length === 0) {
        injectExternalData(index).catch((error) => {
          logStage(`Inject failed: ${error.message}`);
          document.getElementById("runLogBox").textContent = `Inject failed: ${error.message}\n`;
        });
      } else {
        setActiveLessonRecordByIndex(index);
        syncInjectedData().then(() => {
          logStage(`Record index changed to ${index}`);
          document.getElementById("runLogBox").textContent = `Active record changed to index ${index}. Current word: ${window.currentRecord?.word ?? "-"}\n`;
        }).catch((error) => {
          logStage(`Inject failed: ${error.message}`);
          document.getElementById("runLogBox").textContent = `Inject failed: ${error.message}\n`;
        });
      }
    });

    document.getElementById("playCurrentWordBtn").addEventListener("click", async () => {
      try {
        document.getElementById("runLogBox").textContent = "";
        logStage(`Play Current Word clicked for: ${window.currentRecord?.word ?? "(none)"}`);
        await playCurrentWord();
      } catch (error) {
        logStage(`Play Current Word error: ${error.message}`);
        document.getElementById("runLogBox").textContent += `Error: ${error.message}\n`;
      }
    });

    document.getElementById("runExampleBtn").addEventListener("click", async () => {
      try {
        await runExample();
      } catch (error) {
        logStage(`Run Example error: ${error.message}`);
        document.getElementById("runLogBox").textContent += `Error: ${error.message}\n`;
      }
    });

    document.getElementById("selectBlocklyFileBtn").addEventListener("click", async () => {
      try {
        logStage("Opening Blockly file picker");
        await openBlocklyFilePicker();
      } catch (error) {
        logStage(`File picker error: ${error.message}`);
        document.getElementById("runLogBox").textContent += `Error: ${error.message}\n`;
      }
    });

    document.getElementById("blocklyFileInput").addEventListener("change", async (event) => {
      try {
        const file = event.target.files && event.target.files[0];
        logStage(`Selected Blockly file: ${file?.name ?? "(none)"}`);
        await handleSelectedBlocklyFile(file);
      } catch (error) {
        logStage(`Selected file load error: ${error.message}`);
        document.getElementById("runLogBox").textContent += `Error: ${error.message}\n`;
      } finally {
        event.target.value = "";
      }
    });

    applyInitialQueryState();
    logStage(`Initial script source: ${getRequestedScriptPath()}`);
    logStage(`Initial record index: ${getRequestedRecordIndex()}`);

    Promise.all([
      injectExternalData(getRequestedRecordIndex()),
      ensureBlocklyApp(),
      loadExampleScript()
    ]).then(async () => {
      logStage("Initial page setup complete");
      await syncInjectedData();
      if (shouldAutoRun()) {
        logStage("Autorun is enabled");
        await runExample();
      } else {
        logStage("Autorun is disabled");
      }
    }).catch((error) => {
      logStage(`Initial load failed: ${error.message}`);
      document.getElementById("runLogBox").textContent = `Load failed: ${error.message}\n`;
    });
  </script>
</body>
</html>
